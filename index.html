<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Radio Host</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: black; color: white; margin: 0; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(10px); }
        input[type="file"]::file-selector-button {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [streamerName, setStreamerName] = useState('Elizabeth');
            const [currentGame, setCurrentGame] = useState('League of Legends');
            const [customInstructions, setCustomInstructions] = useState('Menciona que estamos ganando');
            const [isGenerating, setIsGenerating] = useState(false);
            const [currentSong, setCurrentSong] = useState({ title: 'Sin archivo', artist: 'Sube un MP3' });
            const [audioUrl, setAudioUrl] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            
            const audioRef = useRef(null);
            const apiKey = ""; 

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const fileName = file.name.replace(/\.[^/.]+$/, "");
                    const parts = fileName.split("-");
                    
                    if (parts.length > 1) {
                        setCurrentSong({ title: parts[1].trim(), artist: parts[0].trim() });
                    } else {
                        setCurrentSong({ title: fileName, artist: "Artista desconocido" });
                    }

                    if (audioUrl) URL.revokeObjectURL(audioUrl);
                    const url = URL.createObjectURL(file);
                    setAudioUrl(url);
                    setIsPlaying(false);
                }
            };

            const togglePlay = () => {
                if (!audioRef.current) return;
                if (isPlaying) {
                    audioRef.current.pause();
                } else {
                    audioRef.current.play();
                }
                setIsPlaying(!isPlaying);
            };

            const pcmToWav = (pcmData, sampleRate) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + pcmData.length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmData.length * 2, true);
                let offset = 44;
                for (let i = 0; i < pcmData.length; i++, offset += 2) view.setInt16(offset, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const generatePresentation = async () => {
                if (isGenerating) return;
                setIsGenerating(true);

                const systemPrompt = `Eres un locutor de radio FM enérgico para el stream de ${streamerName}. Están jugando ${currentGame}. Instrucción: ${customInstructions}. Presenta la canción "${currentSong.title}" de "${currentSong.artist}" en menos de 15 segundos de forma profesional.`;
                
                try {
                    const textRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Genera la intro de radio." }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const textData = await textRes.json();
                    const script = textData.candidates?.[0]?.content?.parts?.[0]?.text || "¡Suban el volumen!";

                    const ttsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: script }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            }
                        })
                    });
                    const ttsData = await ttsRes.json();
                    const pcmBase64 = ttsData.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    
                    if (pcmBase64) {
                        const pcmBinary = atob(pcmBase64);
                        const pcmArray = new Int16Array(pcmBinary.length / 2);
                        for (let i = 0; i < pcmArray.length; i++) {
                            pcmArray[i] = (pcmBinary.charCodeAt(i * 2) & 0xff) | (pcmBinary.charCodeAt(i * 2 + 1) << 8);
                        }
                        const wavBlob = pcmToWav(pcmArray, 24000);
                        const aiAudio = new Audio(URL.createObjectURL(wavBlob));
                        aiAudio.play();
                    }
                } catch (e) {
                    console.error(e);
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="glass border border-zinc-800 p-8 rounded-[3rem] w-full max-w-lg shadow-2xl">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-black tracking-tighter uppercase italic">STREAM <span className="text-purple-500">RADIO</span></h1>
                            <p className="text-zinc-500 text-[10px] font-bold mt-1 uppercase tracking-[0.3em]">Locutor Local MP3</p>
                        </div>

                        <div className="space-y-4 mb-8">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-[10px] font-black text-zinc-500 uppercase mb-1 block">Streamer</label>
                                    <input type="text" value={streamerName} onChange={(e) => setStreamerName(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm outline-none focus:border-purple-600"/>
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-zinc-500 uppercase mb-1 block">Juego</label>
                                    <input type="text" value={currentGame} onChange={(e) => setCurrentGame(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm outline-none focus:border-purple-600"/>
                                </div>
                            </div>
                            
                            <div>
                                <label className="text-[10px] font-black text-zinc-500 uppercase mb-1 block">Subir música (MP3)</label>
                                <div className="relative">
                                    <input 
                                        type="file" 
                                        accept="audio/mpeg" 
                                        onChange={handleFileUpload} 
                                        className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm outline-none focus:border-purple-600 file:hidden cursor-pointer"
                                    />
                                    <div className="absolute right-4 top-2.5 pointer-events-none text-purple-500">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label className="text-[10px] font-black text-zinc-500 uppercase mb-1 block">Instrucciones</label>
                                <textarea value={customInstructions} onChange={(e) => setCustomInstructions(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm outline-none focus:border-purple-600 resize-none" rows="2"></textarea>
                            </div>
                        </div>

                        {audioUrl && <audio ref={audioRef} src={audioUrl} onEnded={() => setIsPlaying(false)} className="hidden" />}

                        <div className="bg-zinc-950 p-6 rounded-[2rem] border border-zinc-900 mb-8 flex items-center gap-6 shadow-inner">
                            <button 
                                onClick={togglePlay}
                                disabled={!audioUrl}
                                className={`w-16 h-16 rounded-2xl flex items-center justify-center flex-shrink-0 transition-all ${audioUrl ? 'bg-white text-black hover:scale-105' : 'bg-zinc-900 text-zinc-800'}`}
                            >
                                {isPlaying ? (
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                                ) : (
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" className="ml-1"><path d="M5 3l14 9-14 9V3z"/></svg>
                                )}
                            </button>
                            <div className="overflow-hidden">
                                <p className="text-purple-500 text-[10px] font-black uppercase tracking-widest mb-1 italic">Now Playing</p>
                                <h2 className="font-bold truncate uppercase tracking-tight">{currentSong.title}</h2>
                                <p className="text-zinc-500 text-xs truncate font-medium">{currentSong.artist}</p>
                            </div>
                        </div>

                        <button 
                            onClick={generatePresentation}
                            disabled={isGenerating || !audioUrl}
                            className={`w-full py-5 rounded-[2.5rem] font-black text-lg transition-all shadow-xl ${isGenerating || !audioUrl ? 'bg-zinc-900 text-zinc-700 cursor-not-allowed' : 'bg-purple-600 hover:bg-purple-500 text-white shadow-purple-900/40 active:scale-95'}`}
                        >
                            {isGenerating ? 'IA GRABANDO...' : 'PRESENTAR CANCIÓN'}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
