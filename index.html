<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Streamer AI - Neon Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        
        .glass { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(236, 72, 153, 0.1); 
        }
        
        .active-track { 
            border-left: 4px solid #db2777; 
            background: rgba(219, 39, 119, 0.1); 
        }

        .neon-border {
            box-shadow: 0 0 15px rgba(219, 39, 119, 0.3);
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #db2777; }

        .progress-bar { transition: width 0.1s linear; }
        .debug-log { font-family: 'Fira Code', monospace; font-size: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 bg-[radial-gradient(ellipse_at_bottom_left,_var(--tw-gradient-stops))] from-purple-950 via-slate-950 to-black">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 bg-gradient-to-r from-purple-900 to-pink-700 p-6 rounded-3xl shadow-2xl relative overflow-hidden neon-border">
            <div class="absolute top-0 right-0 p-8 opacity-10 text-8xl rotate-12">🎙️</div>
            <div class="relative z-10">
                <h1 class="text-4xl font-black italic tracking-tighter text-white">STREAM RADIO AI</h1>
                <p class="text-pink-100 text-sm font-medium">Neon & Cyber Vibes ✨</p>
            </div>
            <div id="status-indicator" class="relative z-10 px-6 py-2 bg-black/40 border border-pink-400/30 backdrop-blur-md rounded-full text-xs font-bold text-pink-300 animate-pulse">
                SISTEMA EN LÍNEA
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Configuración -->
            <section class="lg:col-span-4 space-y-4">
                <div class="glass p-6 rounded-3xl shadow-xl border border-pink-500/10">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <span class="text-pink-500">🕹️</span> Cabina de Control
                    </h2>
                    <div class="space-y-4">
                        <div class="relative">
                            <label class="block text-[10px] font-bold text-purple-400 mb-1 uppercase tracking-widest">Nombre del Locutor/a</label>
                            <div class="flex gap-2">
                                <input type="text" id="username" value="Elizabeth" class="flex-1 bg-black/50 border border-purple-900/50 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-pink-500 outline-none text-sm transition-all text-pink-100">
                                <button id="ai-name-gen" class="bg-purple-900/50 hover:bg-pink-700 p-2.5 rounded-xl transition-all border border-purple-500/30 text-white">
                                    ✨
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] font-bold text-purple-400 mb-1 uppercase tracking-widest">Videojuego Actual</label>
                            <input type="text" id="game" value="Forza 5" class="w-full bg-black/50 border border-purple-900/50 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-pink-500 outline-none text-sm transition-all text-pink-100">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-bold text-purple-400 mb-1 uppercase tracking-widest">Voz IA</label>
                                <select id="voice-select" class="w-full bg-black/50 border border-purple-900/50 rounded-xl px-3 py-2.5 outline-none text-xs text-pink-100">
                                    <option value="Kore">Kore (Cálida)</option>
                                    <option value="Leda">Leda (Elegante)</option>
                                    <option value="Aoede">Aoede (Activa)</option>
                                    <option value="Callirrhoe">Callirrhoe (Dulce)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-purple-400 mb-1 uppercase tracking-widest">Estado Ánimo</label>
                                <select id="mood-select" class="w-full bg-black/50 border border-purple-900/50 rounded-xl px-3 py-2.5 outline-none text-xs text-pink-100">
                                    <option value="alegre y dinámica">Alegre</option>
                                    <option value="misteriosa y épica">Misteriosa</option>
                                    <option value="relajada y nocturna">Relajada</option>
                                    <option value="irónica y graciosa">Graciosa</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="block text-[10px] font-bold text-purple-400 uppercase tracking-widest">Instrucciones Especiales</label>
                                <button id="ai-mood-magic" class="text-[9px] bg-pink-500/20 text-pink-400 px-2 py-0.5 rounded-full hover:bg-pink-500/40 transition font-bold uppercase">✨ Magia</button>
                            </div>
                            <textarea id="extra-instructions" rows="3" placeholder="Ej: Saluda a los nuevos subs..." class="w-full bg-black/50 border border-purple-900/50 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-pink-500 outline-none text-sm text-pink-100"></textarea>
                        </div>

                        <div class="mt-4 pt-4 border-t border-purple-900/50">
                            <label class="block text-[10px] font-bold text-pink-400 mb-2 uppercase tracking-widest">Debug Monitor</label>
                            <div id="debug-console" class="w-full h-32 bg-black/60 rounded-xl p-3 debug-log overflow-y-auto border border-pink-900/30 text-pink-300">
                                > Iniciando entorno neon...
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl border border-pink-500/10">
                    <label class="group flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-purple-900 rounded-2xl cursor-pointer hover:border-pink-500 hover:bg-pink-500/5 transition-all">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <span class="text-2xl mb-2 group-hover:scale-125 transition-transform">🎵</span>
                            <p class="text-xs text-purple-400 font-bold uppercase tracking-tighter">Subir MP3</p>
                        </div>
                        <input type="file" id="file-upload" accept="audio/mpeg" multiple class="hidden">
                    </label>
                </div>
            </section>

            <!-- Playlist y Reproductor -->
            <section class="lg:col-span-8 space-y-6">
                <div id="announcer-box" class="hidden glass border-pink-500/40 p-8 rounded-3xl bg-gradient-to-br from-purple-900/20 via-black to-transparent relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-pink-500 shadow-[0_0_15px_#db2777]"></div>
                    <div class="flex items-start gap-6 relative z-10">
                        <div class="flex flex-col items-center gap-2">
                            <div class="w-16 h-16 bg-pink-600 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(219,39,119,0.5)] animate-pulse">
                                <span class="text-3xl text-white">🎙️</span>
                            </div>
                            <span class="text-[10px] font-black text-pink-400 animate-bounce">AI LIVE</span>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-pink-400 font-black text-xs uppercase tracking-[0.2em] mb-2">Locutora Generando Voz...</h3>
                            <p id="announcement-text" class="text-lg font-medium text-pink-50 leading-relaxed italic">Sintonizando frecuencia gamer...</p>
                        </div>
                    </div>
                </div>

                <div class="glass rounded-3xl overflow-hidden shadow-2xl border border-pink-500/10">
                    <div class="p-6 border-b border-purple-950 flex justify-between items-center bg-black/40">
                        <div>
                            <h2 class="font-black text-xl tracking-tight uppercase text-white">Playlist <span class="text-pink-500">Noir</span></h2>
                            <p id="track-count" class="text-[10px] text-purple-400 font-bold uppercase tracking-widest">0 Canciones</p>
                        </div>
                        <button id="start-btn" class="bg-pink-600 hover:bg-pink-500 px-8 py-3 rounded-2xl text-xs font-black tracking-widest text-white transition-all shadow-[0_0_15px_rgba(219,39,119,0.4)] active:scale-95 uppercase">
                            ▶ Iniciar Radio
                        </button>
                    </div>
                    <div id="playlist-container" class="max-h-[400px] overflow-y-auto p-4 space-y-2">
                        <div class="text-center py-20">
                            <p class="text-purple-500 text-sm font-medium uppercase tracking-tighter italic">No hay música en la base...</p>
                        </div>
                    </div>
                </div>

                <div id="mini-player" class="hidden glass p-6 rounded-3xl border border-pink-500/20 shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-purple-950">
                        <div id="progress-line" class="progress-bar h-full bg-pink-500 shadow-[0_0_10px_#db2777] w-0"></div>
                    </div>
                    <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                        <div class="flex items-center gap-4 w-full md:w-auto">
                            <div class="w-12 h-12 bg-purple-900/50 rounded-xl flex items-center justify-center text-2xl shadow-inner border border-purple-500/20 text-pink-400">💿</div>
                            <div class="min-w-0">
                                <p id="current-track-name" class="text-sm font-black truncate max-w-[200px] text-white">Música</p>
                                <p class="text-[10px] text-pink-400 font-black uppercase tracking-widest">Reproduciendo</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-6">
                            <button id="play-pause-btn" class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center text-xl shadow-lg hover:scale-110 transition-all hover:bg-pink-500 hover:text-white">⏸</button>
                        </div>
                        <div class="hidden md:block">
                             <div id="timer" class="text-[10px] font-mono font-bold text-purple-400">00:00 / 00:00</div>
                        </div>
                    </div>
                </div>
                <audio id="audio-player" class="hidden"></audio>
            </section>
        </div>
    </div>

    <script type="module">
        const apiKey = "";
        const MODEL_TEXT = 'gemini-2.5-flash-preview-09-2025';
        const MODEL_TTS = 'gemini-2.5-flash-preview-tts';

        const fileUpload = document.getElementById('file-upload');
        const playlistContainer = document.getElementById('playlist-container');
        const audioPlayer = document.getElementById('audio-player');
        const startBtn = document.getElementById('start-btn');
        const announcerBox = document.getElementById('announcer-box');
        const announcementText = document.getElementById('announcement-text');
        const statusIndicator = document.getElementById('status-indicator');
        const trackCount = document.getElementById('track-count');
        const miniPlayer = document.getElementById('mini-player');
        const currentTrackName = document.getElementById('current-track-name');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const progressLine = document.getElementById('progress-line');
        const timer = document.getElementById('timer');
        const debugConsole = document.getElementById('debug-console');

        let playlist = [];
        let currentIndex = -1;
        let locPlayer = null;

        function logDebug(msg, type = "info") {
            const time = new Date().toLocaleTimeString();
            const colorClass = type === "error" ? "text-pink-500" : "text-purple-300";
            const newLog = document.createElement('div');
            newLog.className = `mb-1 ${colorClass}`;
            newLog.innerHTML = `[${time}] > ${msg}`;
            debugConsole.prepend(newLog);
        }

        async function fetchWithRetry(url, options, retries = 5, backoff = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    const errorJson = await response.json();
                    throw new Error(`STATUS: ${response.status} | MSG: ${JSON.stringify(errorJson)}`);
                }
                return await response.json();
            } catch (err) {
                if (retries > 0) {
                    await new Promise(res => setTimeout(res, backoff));
                    return fetchWithRetry(url, options, retries - 1, backoff * 2);
                }
                throw err;
            }
        }

        fileUpload.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                playlist.push({ name: file.name, url: URL.createObjectURL(file) });
            });
            renderPlaylist();
            logDebug(`Añadidos ${files.length} tracks.`);
        });

        function renderPlaylist() {
            if (playlist.length === 0) return;
            trackCount.innerText = `${playlist.length} CANCIONES`;
            playlistContainer.innerHTML = '';
            playlist.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = `group p-4 rounded-2xl cursor-pointer hover:bg-pink-500/10 transition-all border border-transparent flex items-center gap-4 ${index === currentIndex ? 'active-track border-pink-500/50 bg-pink-500/10' : 'bg-black/40'}`;
                div.innerHTML = `
                    <div class="w-8 h-8 flex items-center justify-center rounded-full bg-purple-900 group-hover:bg-pink-600 transition-colors">
                        <span class="text-[10px] font-black text-white">${index + 1}</span>
                    </div>
                    <p class="truncate font-bold text-sm text-pink-100 flex-1">${track.name}</p>
                `;
                div.onclick = () => playTrack(index);
                playlistContainer.appendChild(div);
            });
        }

        async function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            
            audioPlayer.pause();
            if (locPlayer) locPlayer.pause();
            
            currentIndex = index;
            renderPlaylist();
            
            miniPlayer.classList.remove('hidden');
            currentTrackName.innerText = playlist[index].name;
            statusIndicator.innerText = "🎙️ PROCESANDO VOZ...";
            announcerBox.classList.remove('hidden');

            try {
                const script = await generateRadioScript(playlist[index].name);
                announcementText.innerText = script;
                
                const voice = document.getElementById('voice-select').value;
                const audioBlob = await textToSpeech(script, voice);
                
                logDebug("Locutora al aire...");
                await playLocution(audioBlob);

                if (currentIndex === index) {
                    audioPlayer.src = playlist[index].url;
                    statusIndicator.innerText = "📻 ON AIR";
                    audioPlayer.play();
                    playPauseBtn.innerText = "⏸";
                }
            } catch (error) {
                logDebug(error.message, "error");
                audioPlayer.src = playlist[index].url;
                audioPlayer.play();
                statusIndicator.innerText = "📻 AL AIRE";
                announcerBox.classList.add('hidden');
            }
        }

        async function generateRadioScript(trackName) {
            const user = (document.getElementById('username').value || "el streamer");
            const game = (document.getElementById('game').value || "un juego");
            const mood = document.getElementById('mood-select').value;

            const prompt = `Actúa como locutora gamer. Estilo: ${mood}. Usuario: ${user}. Juego: ${game}. 
            Presenta: "${trackName}". Máximo 20 palabras. Sé breve y con estilo nocturno.`;

            logDebug(`Generando con ${MODEL_TEXT}...`);
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_TEXT}:generateContent?key=${apiKey}`;
            const data = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "¡Dale play!";
        }

        async function textToSpeech(text, voice) {
            logDebug(`Voz: ${voice} mediante ${MODEL_TTS}...`);
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_TTS}:generateContent?key=${apiKey}`;
            const data = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } }
                    }
                })
            });
            const b64 = data.candidates[0].content.parts[0].inlineData.data;
            return pcmToWav(b64, 24000);
        }

        function pcmToWav(base64, sampleRate) {
            const bin = atob(base64);
            const bytes = new Int16Array(bin.length / 2);
            for (let i = 0; i < bin.length; i += 2) bytes[i / 2] = (bin.charCodeAt(i + 1) << 8) | bin.charCodeAt(i);
            const buffer = new ArrayBuffer(44 + bytes.length * 2);
            const view = new DataView(buffer);
            const s = (o, str) => { for (let i = 0; i < str.length; i++) view.setUint8(o + i, str.charCodeAt(i)); };
            s(0, 'RIFF'); view.setUint32(4, 36 + bytes.length * 2, true); s(8, 'WAVE'); s(12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true); s(36, 'data');
            view.setUint32(40, bytes.length * 2, true);
            for (let i = 0; i < bytes.length; i++) view.setInt16(44 + i * 2, bytes[i], true);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        async function playLocution(blob) {
            return new Promise(res => {
                locPlayer = new Audio(URL.createObjectURL(blob));
                locPlayer.onended = () => { locPlayer = null; res(); };
                locPlayer.onerror = () => res();
                locPlayer.play();
            });
        }

        audioPlayer.ontimeupdate = () => {
            if (!audioPlayer.duration) return;
            const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressLine.style.width = `${percent}%`;
            timer.innerText = `${formatTime(audioPlayer.currentTime)} / ${formatTime(audioPlayer.duration)}`;
        };

        audioPlayer.onended = () => { if (currentIndex < playlist.length - 1) playTrack(currentIndex + 1); };
        function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`; }

        playPauseBtn.onclick = () => {
            if (audioPlayer.paused) { audioPlayer.play(); playPauseBtn.innerText = "⏸"; }
            else { audioPlayer.pause(); playPauseBtn.innerText = "▶"; }
        };

        startBtn.onclick = () => { if (playlist.length > 0) playTrack(0); else logDebug("Playlist vacía", "error"); };
    </script>
</body>
</html>
