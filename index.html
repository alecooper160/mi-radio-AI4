<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Streamer AI - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-track { border-left: 4px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .progress-bar { transition: width 0.1s linear; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-blue-950 to-slate-900">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 bg-blue-600 p-6 rounded-3xl shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-10 text-8xl rotate-12">📻</div>
            <div class="relative z-10">
                <h1 class="text-4xl font-black italic tracking-tighter text-white">STREAM RADIO AI</h1>
                <p class="text-blue-100 text-sm font-medium">Tu radio tu musica</p>
            </div>
            <div id="status-indicator" class="relative z-10 px-6 py-2 bg-blue-900/50 border border-white/20 backdrop-blur-md rounded-full text-xs font-bold animate-pulse">
                SISTEMA LISTO
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Configuración -->
            <section class="lg:col-span-4 space-y-4">
                <div class="glass p-6 rounded-3xl shadow-xl border border-white/5">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <span class="text-blue-400">⚙️</span> Cabina de Control
                    </h2>
                    <div class="space-y-4">
                        <div class="relative">
                            <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Nombre del Locutor/a</label>
                            <div class="flex gap-2">
                                <input type="text" id="username" placeholder="Tu nombre..." class="flex-1 bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all">
                                <button id="ai-name-gen" title="Generar nombre artístico con IA" class="bg-slate-800 hover:bg-slate-700 p-2.5 rounded-xl transition-colors border border-slate-600">
                                    ✨
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Videojuego Actual</label>
                            <input type="text" id="game" placeholder="¿Qué juegas hoy?" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Voz IA</label>
                                <select id="voice-select" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-3 py-2.5 outline-none text-xs">
                                    <option value="Kore">Kore (Cálida)</option>
                                    <option value="Leda">Leda (Elegante)</option>
                                    <option value="Aoede">Aoede (Activa)</option>
                                    <option value="Callirrhoe">Callirrhoe (Dulce)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Estado Ánimo</label>
                                <select id="mood-select" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-3 py-2.5 outline-none text-xs">
                                    <option value="alegre y dinámica">Alegre</option>
                                    <option value="misteriosa y épica">Misteriosa</option>
                                    <option value="relajada y nocturna">Relajada</option>
                                    <option value="irónica y graciosa">Graciosa</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Instrucciones Especiales</label>
                                <button id="ai-mood-magic" class="text-[9px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full hover:bg-blue-500/30 transition text-xs font-bold uppercase">✨ Magia</button>
                            </div>
                            <textarea id="extra-instructions" rows="3" placeholder="Ej: Saluda a los nuevos subs o menciona que es un speedrun..." class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-sm"></textarea>
                        </div>
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl border border-white/5">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">📂 Cargar Archivos</h2>
                    <label class="group flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-700 rounded-2xl cursor-pointer hover:border-blue-500 hover:bg-blue-500/5 transition-all">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <span class="text-2xl mb-2 group-hover:scale-110 transition-transform">🎵</span>
                            <p class="text-xs text-slate-400 font-bold uppercase tracking-tighter">Arrastra tus MP3 aquí</p>
                        </div>
                        <input type="file" id="file-upload" accept="audio/mpeg" multiple class="hidden">
                    </label>
                </div>
            </section>

            <!-- Playlist y Reproductor -->
            <section class="lg:col-span-8 space-y-6">
                <!-- Visualizador de Locución Activa -->
                <div id="announcer-box" class="hidden glass border-blue-500/30 p-8 rounded-3xl bg-gradient-to-br from-blue-600/10 via-slate-900/50 to-transparent relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.8)]"></div>
                    <div class="flex items-start gap-6 relative z-10">
                        <div class="flex flex-col items-center gap-2">
                            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg animate-pulse">
                                <span class="text-3xl">🎙️</span>
                            </div>
                            <span class="text-[10px] font-bold text-blue-400 animate-bounce">ON AIR</span>
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-2">
                                <h3 class="text-blue-400 font-black text-xs uppercase tracking-[0.2em]">Locutora AI Generando...</h3>
                            </div>
                            <p id="announcement-text" class="text-lg font-medium text-slate-100 leading-relaxed italic">Prepárate para la siguiente pista...</p>
                        </div>
                    </div>
                </div>

                <!-- Lista de Canciones -->
                <div class="glass rounded-3xl overflow-hidden shadow-2xl border border-white/5">
                    <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/30">
                        <div>
                            <h2 class="font-black text-xl tracking-tight uppercase">Mi Playlist</h2>
                            <p id="track-count" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">0 Canciones Listas</p>
                        </div>
                        <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-2xl text-xs font-black tracking-widest transition-all shadow-lg active:scale-95 flex items-center gap-2 uppercase">
                            <span>▶</span> Iniciar AI Radio
                        </button>
                    </div>
                    <div id="playlist-container" class="max-h-[400px] overflow-y-auto p-4 space-y-2">
                        <div class="text-center py-20">
                            <p class="text-slate-500 text-sm font-medium mb-2 uppercase tracking-tighter">Biblioteca vacía</p>
                        </div>
                    </div>
                </div>

                <!-- Controles del Reproductor (Mini Player) -->
                <div id="mini-player" class="hidden glass p-6 rounded-3xl border border-white/10 shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-slate-800">
                        <div id="progress-line" class="progress-bar h-full bg-blue-500 shadow-[0_0_10px_#3b82f6] w-0"></div>
                    </div>

                    <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                        <div class="flex items-center gap-4 w-full md:w-auto">
                            <div class="w-12 h-12 bg-slate-800 rounded-xl flex items-center justify-center text-2xl shadow-inner">💿</div>
                            <div class="min-w-0">
                                <p id="current-track-name" class="text-sm font-black truncate max-w-[200px] text-white">Nombre de canción</p>
                                <p class="text-[10px] text-blue-400 font-black uppercase tracking-widest">En Reproducción</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-6">
                            <button id="prev-btn" class="text-slate-400 hover:text-white transition-colors p-2 text-xl" title="Anterior">
                                ⏮
                            </button>
                            <button id="play-pause-btn" class="w-12 h-12 bg-white text-slate-900 rounded-full flex items-center justify-center text-xl shadow-lg hover:scale-105 transition-transform" title="Reproducir/Pausar">
                                ⏸
                            </button>
                            <button id="next-btn" class="text-slate-400 hover:text-white transition-colors p-2 text-xl" title="Siguiente">
                                ⏭
                            </button>
                        </div>

                        <div class="hidden md:block">
                             <div id="timer" class="text-[10px] font-mono font-bold text-slate-400">00:00 / 00:00</div>
                        </div>
                    </div>
                </div>

                <audio id="audio-player" class="hidden"></audio>
            </section>
        </div>
    </div>

    <!-- Modales -->
    <div id="error-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-slate-900 p-8 rounded-3xl max-sm w-full border border-red-500/50 text-center">
            <div class="text-4xl mb-4">⚠️</div>
            <h3 class="text-red-500 font-black text-xl mb-2 italic uppercase">Error de Transmisión</h3>
            <p id="error-msg" class="text-sm text-slate-400 mb-6 font-medium leading-relaxed"></p>
            <button onclick="document.getElementById('error-modal').classList.add('hidden')" class="w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-2xl text-xs font-bold transition-all uppercase tracking-widest">Cerrar</button>
        </div>
    </div>

    <script type="module">
        const apiKey = ""; 
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'radio-ai-pro';

        const fileUpload = document.getElementById('file-upload');
        const playlistContainer = document.getElementById('playlist-container');
        const audioPlayer = document.getElementById('audio-player');
        const startBtn = document.getElementById('start-btn');
        const announcerBox = document.getElementById('announcer-box');
        const announcementText = document.getElementById('announcement-text');
        const statusIndicator = document.getElementById('status-indicator');
        const trackCount = document.getElementById('track-count');
        const miniPlayer = document.getElementById('mini-player');
        const currentTrackName = document.getElementById('current-track-name');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressLine = document.getElementById('progress-line');
        const timer = document.getElementById('timer');

        let playlist = [];
        let currentIndex = -1;
        let isLocuting = false;
        let locPlayer = null;
        let history = []; 

        fileUpload.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const url = URL.createObjectURL(file);
                playlist.push({ name: file.name, url: url });
            });
            renderPlaylist();
        });

        function renderPlaylist() {
            if (playlist.length === 0) return;
            trackCount.innerText = `${playlist.length} CANCIONES LISTAS`;
            playlistContainer.innerHTML = '';
            playlist.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = `group p-4 rounded-2xl cursor-pointer hover:bg-slate-800/80 transition-all border border-transparent flex items-center gap-4 ${index === currentIndex ? 'active-track border-blue-500/50 bg-blue-500/10' : 'bg-slate-900/40'}`;
                div.innerHTML = `
                    <div class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-800 group-hover:bg-blue-600 transition-colors">
                        <span class="text-[10px] font-black">${index + 1}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="truncate font-bold text-sm text-slate-200">${track.name}</p>
                    </div>
                    <div class="text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity">▶</div>
                `;
                div.onclick = () => {
                    playTrack(index);
                };
                playlistContainer.appendChild(div);
            });
        }

        function stopEverything() {
            audioPlayer.pause();
            audioPlayer.src = "";
            if (locPlayer) {
                locPlayer.pause();
                locPlayer.src = "";
                locPlayer = null;
            }
            isLocuting = false;
            progressLine.style.width = "0%";
            statusIndicator.innerText = "SISTEMA LISTO";
        }

        async function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            stopEverything();
            
            currentIndex = index;
            isLocuting = true;
            renderPlaylist();
            
            miniPlayer.classList.remove('hidden');
            currentTrackName.innerText = playlist[index].name;
            statusIndicator.innerText = "🎙️ LOCUTORA AI HABLANDO...";
            announcerBox.classList.remove('hidden');
            announcementText.innerText = "Preparando algo nuevo para ti...";

            try {
                const script = await generateRadioScript(playlist[index].name);
                announcementText.innerText = script;

                const voice = document.getElementById('voice-select').value;
                const audioBlob = await textToSpeech(script, voice);
                
                await playLocution(audioBlob);

                if (currentIndex === index) {
                    isLocuting = false;
                    audioPlayer.src = playlist[index].url;
                    statusIndicator.innerText = "📻 EN EL AIRE";
                    audioPlayer.play();
                    playPauseBtn.innerText = "⏸";
                }
            } catch (error) {
                console.error(error);
                isLocuting = false;
                audioPlayer.src = playlist[index].url;
                audioPlayer.play();
                statusIndicator.innerText = "📻 EN EL AIRE (SIN IA)";
            }
        }

        audioPlayer.ontimeupdate = () => {
            if (!audioPlayer.duration) return;
            const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressLine.style.width = `${percent}%`;
            timer.innerText = `${formatTime(audioPlayer.currentTime)} / ${formatTime(audioPlayer.duration)}`;
        };

        audioPlayer.onended = () => {
            if (currentIndex < playlist.length - 1) playTrack(currentIndex + 1);
            else {
                statusIndicator.innerText = "SISTEMA LISTO";
                announcerBox.classList.add('hidden');
            }
        };

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        playPauseBtn.onclick = () => {
            if (isLocuting) return;
            if (audioPlayer.paused) {
                audioPlayer.play();
                playPauseBtn.innerText = "⏸";
            } else {
                audioPlayer.pause();
                playPauseBtn.innerText = "▶";
            }
        };

        nextBtn.onclick = () => { if (currentIndex < playlist.length - 1) playTrack(currentIndex + 1); };
        prevBtn.onclick = () => { if (currentIndex > 0) playTrack(currentIndex - 1); };

        async function generateRadioScript(trackName) {
            const user = document.getElementById('username').value || "el streamer";
            const game = document.getElementById('game').value || "su juego favorito";
            const mood = document.getElementById('mood-select').value;
            const extra = document.getElementById('extra-instructions').value;

            const recentHistory = history.slice(-5).join(", ");

            const prompt = `Actúa como una locutora de radio profesional. Tono: ${mood}. Usuario: ${user}. Juego: ${game}. 
            REGLA CRÍTICA: No repitas los mismos chistes, saludos o datos curiosos. 
            Historial reciente de temas (NO LOS USES): ${recentHistory}.
            Busca un dato curioso TOTALMENTE NUEVO sobre ${game}. 
            Presenta la canción: "${trackName}". 
            Instrucciones adicionales: ${extra}. Máximo 50 palabras. Sin emojis.`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    tools: [{ "google_search": {} }]
                })
            });
            const data = await response.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "¡Vamos con más música!";
            
            history.push(text.substring(0, 30));
            return text;
        }

        async function textToSpeech(text, voice) {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Voz de radio dinámica: ${text}` }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } }
                    }
                })
            });
            const data = await response.json();
            const b64 = data.candidates[0].content.parts[0].inlineData.data;
            return pcmToWav(b64, 24000);
        }

        function pcmToWav(base64, sampleRate) {
            const bin = atob(base64);
            const bytes = new Int16Array(bin.length / 2);
            for (let i = 0; i < bin.length; i += 2) bytes[i / 2] = (bin.charCodeAt(i + 1) << 8) | bin.charCodeAt(i);
            const buffer = new ArrayBuffer(44 + bytes.length * 2);
            const view = new DataView(buffer);
            const s = (o, str) => { for (let i = 0; i < str.length; i++) view.setUint8(o + i, str.charCodeAt(i)); };
            s(0, 'RIFF'); view.setUint32(4, 36 + bytes.length * 2, true); s(8, 'WAVE'); s(12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true); s(36, 'data');
            view.setUint32(40, bytes.length * 2, true);
            for (let i = 0; i < bytes.length; i++) view.setInt16(44 + i * 2, bytes[i], true);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        async function playLocution(blob) {
            return new Promise(res => {
                locPlayer = new Audio(URL.createObjectURL(blob));
                locPlayer.onended = () => { locPlayer = null; res(); };
                locPlayer.play();
            });
        }

        document.getElementById('ai-name-gen').onclick = async () => {
            const prompt = `Genera un nombre artístico de radio para un gamer. Solo 2 palabras.`;
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const d = await r.json();
            document.getElementById('username').value = d.candidates[0].content.parts[0].text.trim();
        };

        startBtn.onclick = () => { if (playlist.length > 0) playTrack(0); else showError("Sube archivos MP3 primero."); };
        function showError(m) { document.getElementById('error-msg').innerText = m; document.getElementById('error-modal').classList.add('hidden'); }
    </script>
</body>
</html>
