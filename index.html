<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Radio Host</title>
    <!-- Librerías externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: black; color: white; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(10px); }
        .btn-play { transition: transform 0.2s; }
        .btn-play:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [streamerName, setStreamerName] = useState('Elizabeth');
            const [currentGame, setCurrentGame] = useState('League of Legends');
            const [customInstructions, setCustomInstructions] = useState('Menciona que estamos ganando');
            const [playlistUrl, setPlaylistUrl] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentSong, setCurrentSong] = useState({ title: 'Blinding Lights', artist: 'The Weeknd' });
            const apiKey = ""; 

            // Función para convertir audio
            const pcmToWav = (pcmData, sampleRate) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + pcmData.length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmData.length * 2, true);
                let offset = 44;
                for (let i = 0; i < pcmData.length; i++, offset += 2) view.setInt16(offset, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const generatePresentation = async () => {
                if (isGenerating) return;
                setIsGenerating(true);

                const systemPrompt = `Eres un locutor de radio enérgico para el stream de ${streamerName}. Estamos jugando ${currentGame}. Instrucción: ${customInstructions}. Presenta la canción "${currentSong.title}" de "${currentSong.artist}" en menos de 15 segundos.`;
                
                try {
                    const textRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Genera la intro." }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const textData = await textRes.json();
                    const script = textData.candidates?.[0]?.content?.parts?.[0]?.text || "¡Disfruten!";

                    const ttsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: script }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            }
                        })
                    });
                    const ttsData = await ttsRes.json();
                    const pcmBase64 = ttsData.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    
                    if (pcmBase64) {
                        const pcmBinary = atob(pcmBase64);
                        const pcmArray = new Int16Array(pcmBinary.length / 2);
                        for (let i = 0; i < pcmArray.length; i++) {
                            pcmArray[i] = (pcmBinary.charCodeAt(i * 2) & 0xff) | (pcmBinary.charCodeAt(i * 2 + 1) << 8);
                        }
                        const wavBlob = pcmToWav(pcmArray, 24000);
                        new Audio(URL.createObjectURL(wavBlob)).play();
                    }
                } catch (e) {
                    console.error(e);
                } finally {
                    setIsGenerating(false);
                }
            };

            const nextSong = () => {
                setCurrentSong({ title: 'Stay', artist: 'The Kid LAROI' });
            };

            return (
                <div className="w-full max-w-lg p-4">
                    <div className="glass border border-zinc-800 p-8 rounded-[3rem] shadow-2xl">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-black tracking-tighter uppercase text-white">Stream <span className="text-purple-500">Radio</span></h1>
                            <p className="text-zinc-500 text-[10px] font-bold mt-1 uppercase tracking-widest">AI Host System</p>
                        </div>

                        <div className="space-y-4 mb-8">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-[10px] font-black text-zinc-500 uppercase mb-1 block">Streamer</label>
                                    <input type="text" value={streamerName} onChange={(e) => setStreamerName(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm text-white outline-none focus:border-purple-600"/>
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-zinc-500 uppercase mb-1 block">Juego</label>
                                    <input type="text" value={currentGame} onChange={(e) => setCurrentGame(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm text-white outline-none focus:border-purple-600"/>
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-zinc-500 uppercase mb-1 block">Playlist Link (Spotify/YouTube)</label>
                                <input type="text" placeholder="Pega el link aquí" value={playlistUrl} onChange={(e) => setPlaylistUrl(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm text-white outline-none focus:border-purple-600"/>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-zinc-500 uppercase mb-1 block">Instrucciones IA</label>
                                <textarea value={customInstructions} onChange={(e) => setCustomInstructions(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm text-white outline-none focus:border-purple-600 resize-none" rows="2"></textarea>
                            </div>
                        </div>

                        {/* Player Card */}
                        <div className="bg-black/50 p-6 rounded-[2rem] border border-zinc-800 mb-8 flex flex-col gap-4">
                            <div className="flex items-center gap-4">
                                <div className="w-16 h-16 bg-zinc-800 rounded-2xl overflow-hidden flex-shrink-0 border border-zinc-700">
                                    <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=200&h=200&fit=crop" className="w-full h-full object-cover grayscale" alt="Cover" />
                                </div>
                                <div className="overflow-hidden flex-1">
                                    <p className="text-purple-500 text-[10px] font-black uppercase tracking-widest mb-1">Sincronizado</p>
                                    <h2 className="font-bold truncate uppercase text-sm text-white">{currentSong.title}</h2>
                                    <p className="text-zinc-500 text-[10px] truncate">{currentSong.artist}</p>
                                </div>
                            </div>
                            
                            {/* Player Controls */}
                            <div className="flex items-center justify-center gap-6 pt-4 border-t border-zinc-800/50">
                                <button 
                                    onClick={() => setIsPlaying(!isPlaying)}
                                    className="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:bg-zinc-200 transition-colors btn-play shadow-lg shadow-white/5"
                                >
                                    {isPlaying ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" className="ml-1"><path d="M8 5v14l11-7z"/></svg>
                                    )}
                                </button>
                                <button 
                                    onClick={nextSong}
                                    className="text-zinc-500 hover:text-white transition-colors p-2"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                                </button>
                            </div>
                        </div>

                        <button 
                            onClick={generatePresentation}
                            disabled={isGenerating}
                            className={`w-full py-5 rounded-[2rem] font-black text-lg transition-all shadow-xl ${isGenerating ? 'bg-zinc-800 text-zinc-600' : 'bg-purple-600 hover:bg-purple-500 text-white shadow-purple-900/40'}`}
                        >
                            {isGenerating ? 'IA PENSANDO...' : 'PRESENTAR EN VIVO'}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
