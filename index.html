<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio Host Studio - ElevenLabs Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #050505; color: white; margin: 0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 25, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-border { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 0 20px rgba(168, 85, 247, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const geminiKey = "AIzaSyApkkp1hMsopejJzV5sDXzpcdY0wWHjJT0"; 
            const elevenLabsKey = "sk_31d845ebfc082c303d5f166ce45af9211a4251b14aca1604";

            // Opciones de voces de ElevenLabs
            const voiceOptions = [
                { id: "nPczCjzB2jt3Y89vIsO5", name: "Brian (Locutor Épico)" },
                { id: "21mO95p2mu5zBarU6nIc", name: "Rachel (Femenina Suave)" },
                { id: "D38z5qSOfp9HshR9vLTo", name: "Fin (Energético)" },
                { id: "piTKgc95f3D9L5tX0N8h", name: "Nicole (Juvenil)" }
            ];

            const [streamerName, setStreamerName] = useState('Elizabeth');
            const [currentGame, setCurrentGame] = useState('League of Legends');
            const [customInstructions, setCustomInstructions] = useState('¡Saluda con mucha energía!');
            const [selectedVoice, setSelectedVoice] = useState(voiceOptions[0].id);
            const [isGenerating, setIsGenerating] = useState(false);
            const [playlist, setPlaylist] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(null);
            const [error, setError] = useState('');
            
            const handleFilesUpload = (e) => {
                const files = Array.from(e.target.files);
                const newTracks = files.map(file => ({
                    id: crypto.randomUUID(),
                    title: file.name.replace(/\.[^/.]+$/, ""),
                    url: URL.createObjectURL(file)
                }));
                setPlaylist(prev => [...prev, ...newTracks]);
                if (currentIndex === null && newTracks.length > 0) setCurrentIndex(0);
            };

            const generatePresentation = async () => {
                if (currentIndex === null || isGenerating) return;
                setIsGenerating(true);
                setError('');

                const track = playlist[currentIndex];
                const promptText = `Eres un locutor de radio para el stream de ${streamerName}. Juego: ${currentGame}. Instrucción: ${customInstructions}. Presenta la canción "${track.title}" de forma épica y profesional. Máximo 20 palabras. No incluyas hashtags ni emojis.`;
                
                try {
                    // 1. Generar Guion con Gemini
                    const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }] }]
                        })
                    });

                    const geminiData = await geminiRes.json();
                    if (!geminiRes.ok) throw new Error(geminiData.error?.message || "Error en Gemini");
                    
                    const script = geminiData.candidates?.[0]?.content?.parts?.[0]?.text || "¡Suban el volumen!";

                    // 2. Generar Voz con ElevenLabs usando la voz seleccionada
                    const elevenRes = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${selectedVoice}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'xi-api-key': elevenLabsKey
                        },
                        body: JSON.stringify({
                            text: script,
                            model_id: "eleven_multilingual_v2",
                            voice_settings: {
                                stability: 0.5,
                                similarity_boost: 0.75
                            }
                        })
                    });

                    if (!elevenRes.ok) {
                        const errData = await elevenRes.json();
                        throw new Error(errData.detail?.message || "Error en ElevenLabs");
                    }

                    const audioBlob = await elevenRes.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play();

                } catch (e) {
                    setError(`Error: ${e.message}`);
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="glass p-10 rounded-[3.5rem] w-full max-w-4xl shadow-2xl flex flex-col md:flex-row gap-10 neon-border">
                        <div className="flex-1 space-y-6">
                            <h1 className="text-4xl font-black italic uppercase tracking-tighter">RADIO <span className="text-purple-500">STUDIO</span></h1>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2 block px-2">Nombre Streamer</label>
                                    <input type="text" value={streamerName} onChange={e=>setStreamerName(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 text-sm outline-none focus:border-purple-600" placeholder="Nombre"/>
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2 block px-2">Juego Actual</label>
                                    <input type="text" value={currentGame} onChange={e=>setCurrentGame(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 text-sm outline-none focus:border-purple-600" placeholder="Juego"/>
                                </div>
                            </div>

                            <div>
                                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2 block px-2">Voz del Locutor (ElevenLabs)</label>
                                <select 
                                    value={selectedVoice} 
                                    onChange={e => setSelectedVoice(e.target.value)}
                                    className="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 text-sm outline-none focus:border-purple-600 appearance-none"
                                >
                                    {voiceOptions.map(voice => (
                                        <option key={voice.id} value={voice.id}>{voice.name}</option>
                                    ))}
                                </select>
                            </div>

                            <div className="bg-zinc-950 p-5 rounded-[2rem] border border-zinc-900">
                                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2 block">Cargar Música (MP3)</label>
                                <input type="file" accept="audio/mpeg" multiple onChange={handleFilesUpload} className="text-xs text-zinc-400 file:bg-purple-600 file:text-white file:border-0 file:rounded-full file:px-5 file:py-2 cursor-pointer w-full"/>
                            </div>

                            <div>
                                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2 block px-2">Instrucciones de estilo</label>
                                <textarea value={customInstructions} onChange={e=>setCustomInstructions(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-3xl px-4 py-4 text-sm h-20 outline-none focus:border-purple-600" placeholder="Instrucciones..."></textarea>
                            </div>

                            <button onClick={generatePresentation} disabled={isGenerating || currentIndex === null} className="w-full py-6 bg-purple-600 rounded-[2.5rem] font-black uppercase hover:bg-purple-500 transition-all shadow-lg disabled:opacity-50">
                                {isGenerating ? 'GENERANDO AUDIO...' : 'HABLAR EN EL STREAM'}
                            </button>
                            
                            {error && <div className="text-red-500 text-xs font-bold text-center bg-red-500/10 p-3 rounded-2xl border border-red-500/20">{error}</div>}
                        </div>

                        <div className="w-full md:w-80 bg-zinc-950/30 rounded-[3rem] border border-zinc-800 flex flex-col h-[480px]">
                            <div className="p-6 border-b border-zinc-800/50 text-[11px] font-black text-zinc-500 uppercase tracking-widest">Lista de Reproducción</div>
                            <div className="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-2">
                                {playlist.map((t, i) => (
                                    <div key={t.id} onClick={()=>setCurrentIndex(i)} className={`p-4 rounded-2xl cursor-pointer transition-all border ${currentIndex === i ? 'bg-purple-950/20 border-purple-500/30 text-purple-400' : 'border-transparent text-zinc-500 hover:bg-white/5'}`}>
                                        <p className="text-xs font-bold truncate">{t.title}</p>
                                    </div>
                                ))}
                                {playlist.length === 0 && <p className="text-[10px] text-zinc-700 text-center mt-10 italic">No hay archivos cargados</p>}
                            </div>
                            {currentIndex !== null && (
                                <div className="p-4 bg-zinc-900 rounded-b-[3rem]">
                                    <audio src={playlist[currentIndex].url} controls className="w-full h-8 invert opacity-50" />
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
