<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Radio Host for Streamers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .audio-wave { display: flex; align-items: center; gap: 2px; height: 20px; }
        .bar { width: 3px; background: #3b82f6; animation: wave 1s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { height: 5px; } 50% { height: 20px; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .active-track { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">AI Radio Host</h1>
            <p class="text-slate-400">Tu locutor personal para transmisiones en vivo</p>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <section class="glass p-6 rounded-2xl space-y-4">
                <h2 class="text-xl font-semibold flex items-center gap-2 text-blue-400">Perfil de Transmisión</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Streamer</label>
                        <input type="text" id="streamerName" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 outline-none focus:border-blue-500 transition-colors" placeholder="Elizabeth">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Juego</label>
                        <input type="text" id="gameName" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 outline-none focus:border-blue-500 transition-colors" placeholder="Minecraft">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Motor de Voz</label>
                        <select id="voiceEngine" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 outline-none focus:border-blue-500 transition-colors" onchange="updateVoiceList()">
                            <option value="elevenlabs">ElevenLabs (Premium)</option>
                            <option value="google">Google AI (Natural)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Voz</label>
                        <select id="voiceId" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 outline-none focus:border-blue-500 transition-colors"></select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Instrucciones Extra</label>
                    <textarea id="extraInstructions" rows="2" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 outline-none text-sm focus:border-blue-500 transition-colors" placeholder="Ej. Estilo FM nocturno..."></textarea>
                </div>
            </section>

            <section class="glass p-6 rounded-2xl space-y-4">
                <h2 class="text-xl font-semibold flex items-center gap-2 text-purple-400">Lista de Reproducción</h2>
                <div class="border-2 border-dashed border-slate-700 rounded-xl p-4 text-center relative cursor-pointer hover:border-purple-500 transition-colors group">
                    <input type="file" id="musicFiles" multiple accept="audio/mpeg, audio/mp3" class="absolute inset-0 opacity-0 cursor-pointer">
                    <p id="uploadPrompt" class="text-slate-400 group-hover:text-purple-400 text-sm">Añadir canciones (.mp3)</p>
                </div>
                <div id="playlist" class="max-h-56 overflow-y-auto space-y-2 pr-2 border-t border-slate-800 pt-2 text-slate-300"></div>
            </section>
        </main>

        <footer class="glass p-6 rounded-2xl shadow-2xl">
            <div id="statusBox" class="hidden mb-4 p-3 bg-blue-900/30 border border-blue-500/50 rounded-lg text-sm flex items-center justify-between">
                <span id="statusMessage">Cargando...</span>
                <div class="audio-wave"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
            </div>

            <div class="flex flex-col space-y-4 text-center">
                <p id="nowPlaying" class="font-bold text-xl text-white truncate">Radio en Espera</p>
                <p id="trackDetails" class="text-sm text-slate-400">Carga archivos y dale al Play</p>
                <div class="flex items-center justify-center gap-6">
                    <button id="prevBtn" class="p-3 rounded-full hover:bg-slate-800 text-slate-400 disabled:opacity-20"><svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"></path></svg></button>
                    <button id="mainPlayBtn" class="bg-blue-600 p-5 rounded-full shadow-lg transition-all disabled:bg-slate-700">
                        <div id="playIcon"><svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg></div>
                        <div id="pauseIcon" class="hidden"><svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg></div>
                    </button>
                    <button id="nextBtn" class="p-3 rounded-full hover:bg-slate-800 text-slate-400 disabled:opacity-20"><svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"></path></svg></button>
                </div>
            </div>
            <audio id="audioPlayer" class="hidden"></audio>
        </footer>
    </div>

    <script>
        // ¡IMPORTANTE! Reemplaza con tu API KEY de Gemini para que la IA genere el guion.
        const GEMINI_API_KEY = ""; 

        const voices = {
            google: [{ id: "Kore", name: "Kore (Femenina)" }, { id: "Zephyr", name: "Zephyr (Masculina)" }],
            elevenlabs: [{ id: "pNInz6obpgDQGcFmaJgB", name: "Adam (Masculina)" }, { id: "Xb7hH9S3oU4shU66pScB", name: "Alice (Femenina)" }]
        };

        const audioPlayer = document.getElementById('audioPlayer');
        const mainPlayBtn = document.getElementById('mainPlayBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        
        let playlist = [];
        let currentIndex = -1;
        let isLocutionActive = false;

        function updateVoiceList() {
            const engine = document.getElementById('voiceEngine').value;
            const select = document.getElementById('voiceId');
            select.innerHTML = voices[engine].map(v => `<option value="${v.id}">${v.name}</option>`).join('');
        }

        document.getElementById('musicFiles').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => playlist.push({ name: file.name.replace(/\.[^/.]+$/, ""), blobUrl: URL.createObjectURL(file) }));
            renderPlaylist();
            mainPlayBtn.disabled = false;
        });

        function renderPlaylist() {
            document.getElementById('playlist').innerHTML = playlist.map((s, i) => `
                <div class="p-2 rounded border transition-all ${i === currentIndex ? 'active-track' : 'bg-slate-800/30 border-slate-700/50'}">
                    <span class="truncate text-xs">${s.name}</span>
                </div>
            `).join('');
        }

        async function playTrack(direction = 1) {
            if (playlist.length === 0) return;
            currentIndex = (currentIndex + direction + playlist.length) % playlist.length;
            renderPlaylist();
            const song = playlist[currentIndex];
            
            try {
                isLocutionActive = true;
                setUI(true, "IA generando locución...");
                
                // 1. Generar texto con Gemini
                const script = await generateScript(song.name);
                
                // 2. Generar Audio (vía Servidor o Google local)
                const engine = document.getElementById('voiceEngine').value;
                const voiceId = document.getElementById('voiceId').value;
                let voiceUrl;

                if (engine === 'elevenlabs') {
                    const res = await fetch('/generar-audio', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ texto: script, voiceId: voiceId })
                    });
                    if (!res.ok) throw new Error("Fallo en ElevenLabs");
                    const blob = await res.blob();
                    voiceUrl = URL.createObjectURL(blob);
                } else {
                    voiceUrl = await generateGoogleTTS(script, voiceId);
                }

                // 3. Reproducir locución
                document.getElementById('nowPlaying').innerText = `🎙️ Locutor Presentando...`;
                audioPlayer.src = voiceUrl;
                await audioPlayer.play();
                toggleIcons(false);

                // 4. Al terminar locución, reproducir canción
                audioPlayer.onended = () => {
                    isLocutionActive = false;
                    setUI(false);
                    document.getElementById('nowPlaying').innerText = `🎵 ${song.name}`;
                    audioPlayer.src = song.blobUrl;
                    audioPlayer.play();
                    audioPlayer.onended = () => playTrack(1);
                };
            } catch (e) {
                console.error("Error IA:", e);
                setUI(false);
                isLocutionActive = false;
                audioPlayer.src = song.blobUrl;
                audioPlayer.play();
            }
        }

        async function generateScript(song) {
            const streamer = document.getElementById('streamerName').value || "Elizabeth";
            const game = document.getElementById('gameName').value || "su directo";
            const extra = document.getElementById('extraInstructions').value;
            const prompt = `Eres un locutor de radio. Saluda al público de ${streamer} que está jugando ${game}. Presenta con emoción la canción "${song}". ${extra}. Usa 40 palabras.`;
            
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function generateGoogleTTS(text, voice) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text }] }],
                    generationConfig: { 
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } }
                    }
                })
            });
            const data = await res.json();
            const base64 = data.candidates[0].content.parts[0].inlineData.data;
            return pcmToWavUrl(base64, 24000);
        }

        function pcmToWavUrl(base64, rate) {
            const bin = atob(base64);
            const buf = new ArrayBuffer(44 + bin.length);
            const v = new DataView(buf);
            const s = (o, str) => { for (let i = 0; i < str.length; i++) v.setUint8(o + i, str.charCodeAt(i)); };
            s(0, 'RIFF'); v.setUint32(4, 36 + bin.length, true); s(8, 'WAVE'); s(12, 'fmt ');
            v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
            v.setUint32(24, rate, true); v.setUint32(28, rate * 2, true); v.setUint16(32, 2, true);
            v.setUint16(34, 16, true); s(36, 'data'); v.setUint32(40, bin.length, true);
            for (let i = 0; i < bin.length; i++) v.setUint8(44 + i, bin.charCodeAt(i));
            return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
        }

        mainPlayBtn.addEventListener('click', () => {
            if (currentIndex === -1) playTrack(1);
            else if (audioPlayer.paused) { audioPlayer.play(); toggleIcons(false); }
            else { audioPlayer.pause(); toggleIcons(true); }
        });

        document.getElementById('nextBtn').addEventListener('click', () => playTrack(1));
        document.getElementById('prevBtn').addEventListener('click', () => playTrack(-1));

        function toggleIcons(p) { playIcon.classList.toggle('hidden', !p); pauseIcon.classList.toggle('hidden', p); }
        function setUI(s, m) { document.getElementById('statusBox').classList.toggle('hidden', !s); document.getElementById('statusMessage').innerText = m; }
        updateVoiceList();
    </script>
</body>
</html>
