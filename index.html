<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Radio Host for Streamers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .audio-wave { display: flex; align-items: center; gap: 2px; height: 20px; }
        .bar { width: 3px; background: #3b82f6; animation: wave 1s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { height: 5px; } 50% { height: 20px; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">AI Radio Host</h1>
            <p class="text-slate-400">Presenta tus canciones como un profesional del aire</p>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <section class="glass p-6 rounded-2xl space-y-4">
                <h2 class="text-xl font-semibold flex items-center gap-2 text-blue-400">Perfil de Transmisión</h2>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Nombre del Streamer</label>
                    <input type="text" id="streamerName" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 outline-none" placeholder="Ej. LobaStreamer">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Juego Actual</label>
                    <input type="text" id="gameName" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 outline-none" placeholder="Ej. Minecraft">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Voz de la IA</label>
                    <select id="voiceId" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 outline-none">
                        <option value="21m00Tcm4llvDq8ikWAM">Rachel</option>
                        <option value="ErXwVqcDNo3uWpY6F8rO">Antoni</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Instrucciones Extra</label>
                    <textarea id="extraInstructions" rows="2" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 outline-none text-sm"></textarea>
                </div>
            </section>

            <section class="glass p-6 rounded-2xl space-y-4">
                <h2 class="text-xl font-semibold flex items-center gap-2 text-purple-400">Música</h2>
                <div class="border-2 border-dashed border-slate-700 rounded-xl p-8 text-center relative cursor-pointer hover:border-purple-500">
                    <input type="file" id="musicFiles" multiple accept="audio/mp3" class="absolute inset-0 opacity-0 cursor-pointer">
                    <p class="text-slate-400">Cargar MP3s</p>
                </div>
                <div id="playlist" class="max-h-48 overflow-y-auto space-y-2"></div>
            </section>
        </main>

        <footer class="glass p-6 rounded-2xl">
            <div id="statusBox" class="hidden mb-4 p-3 bg-blue-900/30 border border-blue-500/50 rounded-lg text-sm flex items-center justify-between">
                <span id="statusMessage">Generando...</span>
                <div class="audio-wave"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
            </div>
            <div class="flex flex-col md:flex-row items-center gap-4">
                <div class="flex-1">
                    <p id="nowPlaying" class="font-bold text-lg text-slate-100">Esperando...</p>
                    <p id="trackDetails" class="text-sm text-slate-400 text-center md:text-left">Carga música para empezar.</p>
                </div>
                <button id="playBtn" disabled class="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white px-8 py-3 rounded-full font-bold shadow-lg transform active:scale-95">REPRODUCIR SIGUIENTE</button>
            </div>
            <audio id="audioPlayer" class="hidden"></audio>
        </footer>
    </div>

    <script>
        const GEMINI_API_KEY = ""; // Inyectada por el entorno
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        let playlist = [];
        let currentIndex = -1;

        document.getElementById('musicFiles').addEventListener('change', (e) => {
            Array.from(e.target.files).forEach(file => {
                playlist.push({ name: file.name.replace('.mp3', ''), url: URL.createObjectURL(file) });
            });
            renderPlaylist();
            if (playlist.length > 0) playBtn.disabled = false;
        });

        function renderPlaylist() {
            document.getElementById('playlist').innerHTML = playlist.map((s, i) => `
                <div class="p-2 bg-slate-800/50 rounded-lg text-sm truncate border border-transparent hover:border-blue-500/50">${s.name}</div>
            `).join('');
        }

        playBtn.addEventListener('click', async () => {
            if (playlist.length === 0) return;
            
            currentIndex = (currentIndex + 1) % playlist.length;
            const song = playlist[currentIndex];
            const streamer = document.getElementById('streamerName').value || "el Streamer";
            const game = document.getElementById('gameName').value || "su juego favorito";
            const extra = document.getElementById('extraInstructions').value;

            setUI(true, "Generando guion creativo...");

            try {
                // 1. Gemini genera el texto de presentación
                const prompt = `Escribe una intro de radio dinámica de máximo 20 palabras. Streamer: ${streamer}. Juego: ${game}. Canción: ${song.name}. Instrucciones extra: ${extra}. Termina con emoción.`;
                const text = await generateText(prompt);
                
                // 2. Obtener y reproducir la voz mediante el servidor
                setUI(true, "Convirtiendo texto a locución...");
                await obtenerVozYReproducir(text, song);

            } catch (e) {
                console.error("Error en el proceso:", e);
                setUI(false);
                playBtn.disabled = false;
            }
        });

        async function obtenerVozYReproducir(textoParaConvertir, song) {
            const voiceId = document.getElementById('voiceId').value;
            
            // Petición al servidor Node.js según tu estructura
            const respuesta = await fetch('/generar-audio', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    texto: textoParaConvertir,
                    voiceId: voiceId 
                })
            });

            if (!respuesta.ok) throw new Error("Error en el servidor de audio");

            const blob = await respuesta.blob();
            const urlAudioLocutor = URL.createObjectURL(blob);
            
            // Configurar secuencia de audio
            playBtn.disabled = true;
            document.getElementById('nowPlaying').innerText = `🎙️ Locutor: Presentando...`;
            document.getElementById('trackDetails').innerText = `Sintonizando para ${document.getElementById('streamerName').value}`;

            audioPlayer.src = urlAudioLocutor;
            audioPlayer.play();

            // Al terminar la voz del locutor, empieza la canción
            audioPlayer.onended = () => {
                document.getElementById('nowPlaying').innerText = `🎵 Sonando: ${song.name}`;
                document.getElementById('trackDetails').innerText = `¡Disfruta del tema!`;
                audioPlayer.src = song.url;
                audioPlayer.play();
                
                audioPlayer.onended = () => {
                    setUI(false);
                    playBtn.disabled = false;
                };
            };
        }

        async function generateText(prompt) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: "Eres un locutor de radio pro y breve." }] }
                })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        function setUI(show, msg) {
            const box = document.getElementById('statusBox');
            box.classList.toggle('hidden', !show);
            document.getElementById('statusMessage').innerText = msg;
        }
    </script>
</body>
</html>
