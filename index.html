<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Radio Host - MP3 Playlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: black; color: white; margin: 0; font-family: sans-serif; }
        .glass { background: rgba(24, 24, 27, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(63, 63, 70, 0.4); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .active-track { background: rgba(168, 85, 247, 0.1); border-color: rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [streamerName, setStreamerName] = useState('Elizabeth');
            const [currentGame, setCurrentGame] = useState('League of Legends');
            const [customInstructions, setCustomInstructions] = useState('¡Estamos imparables hoy!');
            const [isGenerating, setIsGenerating] = useState(false);
            
            const [playlist, setPlaylist] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            
            const audioRef = useRef(null);
            const apiKey = ""; 

            const handleFilesUpload = (e) => {
                const files = Array.from(e.target.files);
                const newTracks = files.map(file => {
                    const fileName = file.name.replace(/\.[^/.]+$/, "");
                    const parts = fileName.split("-");
                    return {
                        id: crypto.randomUUID(),
                        title: parts.length > 1 ? parts[1].trim() : fileName,
                        artist: parts.length > 1 ? parts[0].trim() : "Artista desconocido",
                        url: URL.createObjectURL(file)
                    };
                });
                
                setPlaylist(prev => [...prev, ...newTracks]);
                if (currentIndex === null && newTracks.length > 0) {
                    setCurrentIndex(playlist.length);
                }
            };

            const togglePlay = () => {
                if (currentIndex === null) return;
                if (isPlaying) {
                    audioRef.current.pause();
                } else {
                    audioRef.current.play();
                }
                setIsPlaying(!isPlaying);
            };

            const playTrack = (index) => {
                setCurrentIndex(index);
                setIsPlaying(true);
                // React updates state asynchronously, so we handle the actual play in a useEffect or small timeout
            };

            useEffect(() => {
                if (currentIndex !== null && isPlaying && audioRef.current) {
                    audioRef.current.play().catch(e => console.log("User interaction required"));
                }
            }, [currentIndex, isPlaying]);

            const pcmToWav = (pcmData, sampleRate) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + pcmData.length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmData.length * 2, true);
                let offset = 44;
                for (let i = 0; i < pcmData.length; i++, offset += 2) view.setInt16(offset, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const generatePresentation = async () => {
                if (isGenerating || currentIndex === null) return;
                setIsGenerating(true);

                const currentTrack = playlist[currentIndex];
                const systemPrompt = `Eres un locutor de radio FM profesional para el stream de ${streamerName}. Están jugando ${currentGame}. Instrucción: ${customInstructions}. Presenta la canción "${currentTrack.title}" de "${currentTrack.artist}" con mucha energía en un máximo de 15 segundos.`;
                
                try {
                    const textRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Genera la intro de locutor de radio." }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const textData = await textRes.json();
                    const script = textData.candidates?.[0]?.content?.parts?.[0]?.text || "¡Suban el volumen, esto es Radio Stream!";

                    const ttsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: script }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            }
                        })
                    });
                    const ttsData = await ttsRes.json();
                    const pcmBase64 = ttsData.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    
                    if (pcmBase64) {
                        const pcmBinary = atob(pcmBase64);
                        const pcmArray = new Int16Array(pcmBinary.length / 2);
                        for (let i = 0; i < pcmArray.length; i++) {
                            pcmArray[i] = (pcmBinary.charCodeAt(i * 2) & 0xff) | (pcmBinary.charCodeAt(i * 2 + 1) << 8);
                        }
                        const wavBlob = pcmToWav(pcmArray, 24000);
                        const aiAudio = new Audio(URL.createObjectURL(wavBlob));
                        aiAudio.play();
                    }
                } catch (e) {
                    console.error(e);
                } finally {
                    setIsGenerating(false);
                }
            };

            const nextTrack = () => {
                if (playlist.length === 0) return;
                const nextIdx = (currentIndex + 1) % playlist.length;
                setCurrentIndex(nextIdx);
                setIsPlaying(true);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="glass p-8 rounded-[3rem] w-full max-w-2xl shadow-2xl flex flex-col md:flex-row gap-8">
                        
                        {/* Panel de Controles Izquierdo */}
                        <div className="flex-1 space-y-6">
                            <div className="text-left">
                                <h1 className="text-3xl font-black tracking-tighter uppercase italic leading-none">STREAM <span className="text-purple-500 block">RADIO HOST</span></h1>
                                <p className="text-zinc-500 text-[10px] font-bold mt-2 uppercase tracking-[0.3em]">MP3 Studio Edition</p>
                            </div>

                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-[10px] font-black text-zinc-500 uppercase mb-1 block tracking-wider">Streamer</label>
                                        <input type="text" value={streamerName} onChange={(e) => setStreamerName(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm outline-none focus:border-purple-600 transition-all"/>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-zinc-500 uppercase mb-1 block tracking-wider">Juego</label>
                                        <input type="text" value={currentGame} onChange={(e) => setCurrentGame(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm outline-none focus:border-purple-600 transition-all"/>
                                    </div>
                                </div>
                                
                                <div>
                                    <label className="text-[10px] font-black text-zinc-500 uppercase mb-1 block tracking-wider">Añadir MP3s a la lista</label>
                                    <div className="relative group">
                                        <input 
                                            type="file" 
                                            accept="audio/mpeg" 
                                            multiple
                                            onChange={handleFilesUpload} 
                                            className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-3 text-sm outline-none group-hover:border-purple-500/50 transition-all file:hidden cursor-pointer"
                                        />
                                        <div className="absolute right-4 top-3 pointer-events-none text-purple-500">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <label className="text-[10px] font-black text-zinc-500 uppercase mb-1 block tracking-wider">Contexto para la IA</label>
                                    <textarea value={customInstructions} onChange={(e) => setCustomInstructions(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm outline-none focus:border-purple-600 resize-none" rows="2"></textarea>
                                </div>
                            </div>

                            <button 
                                onClick={generatePresentation}
                                disabled={isGenerating || currentIndex === null}
                                className={`w-full py-4 rounded-2xl font-black text-sm uppercase tracking-widest transition-all shadow-xl ${isGenerating || currentIndex === null ? 'bg-zinc-900 text-zinc-700 cursor-not-allowed' : 'bg-purple-600 hover:bg-purple-500 text-white shadow-purple-900/40 active:scale-95'}`}
                            >
                                {isGenerating ? 'IA GRABANDO INTRO...' : 'PRESENTAR CANCIÓN (IA)'}
                            </button>
                        </div>

                        {/* Panel de Playlist Derecho */}
                        <div className="w-full md:w-72 flex flex-col">
                            <div className="mb-4 flex items-center justify-between">
                                <h3 className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Playlist Local</h3>
                                <span className="text-[10px] text-purple-500 font-bold">{playlist.length} TEMAS</span>
                            </div>

                            <div className="flex-1 bg-zinc-950 border border-zinc-900 rounded-3xl overflow-hidden flex flex-col h-[320px]">
                                <div className="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                                    {playlist.length === 0 ? (
                                        <div className="h-full flex items-center justify-center text-center p-4">
                                            <p className="text-zinc-700 text-[10px] font-bold uppercase leading-relaxed">Sube archivos MP3 para armar tu radio</p>
                                        </div>
                                    ) : (
                                        playlist.map((track, index) => (
                                            <div 
                                                key={track.id} 
                                                onClick={() => playTrack(index)}
                                                className={`p-3 rounded-2xl border border-transparent cursor-pointer transition-all hover:bg-zinc-900 ${currentIndex === index ? 'active-track' : ''}`}
                                            >
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-2 h-2 rounded-full ${currentIndex === index && isPlaying ? 'bg-purple-500 animate-pulse' : 'bg-zinc-800'}`}></div>
                                                    <div className="overflow-hidden">
                                                        <p className={`text-xs font-bold truncate ${currentIndex === index ? 'text-white' : 'text-zinc-400'}`}>{track.title}</p>
                                                        <p className="text-[9px] text-zinc-600 truncate uppercase">{track.artist}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>

                                {/* Mini Player Bottom */}
                                <div className="p-4 bg-zinc-900/50 border-t border-zinc-800">
                                    <div className="flex items-center justify-between mb-4">
                                        <button onClick={togglePlay} className="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition-transform shadow-lg">
                                            {isPlaying ? (
                                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                                            ) : (
                                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" className="ml-0.5"><path d="M5 3l14 9-14 9V3z"/></svg>
                                            )}
                                        </button>
                                        <button onClick={nextTrack} className="text-zinc-500 hover:text-white transition-colors">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                                        </button>
                                        <div className="text-right flex-1 ml-4 overflow-hidden">
                                            <p className="text-[8px] text-purple-500 font-bold uppercase tracking-widest truncate">Live</p>
                                            <p className="text-[10px] text-white font-bold truncate leading-none mt-1">
                                                {currentIndex !== null ? playlist[currentIndex].title : "Radio Off"}
                                            </p>
                                        </div>
                                    </div>
                                    {currentIndex !== null && (
                                        <audio 
                                            ref={audioRef} 
                                            src={playlist[currentIndex].url} 
                                            onEnded={nextTrack} 
                                            className="hidden" 
                                        />
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
