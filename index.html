<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Radio Host for Streamers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .audio-wave { display: flex; align-items: center; gap: 2px; height: 20px; }
        .bar { width: 3px; background: #3b82f6; animation: wave 1s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { height: 5px; } 50% { height: 20px; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .active-track { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">AI Radio Host</h1>
            <p class="text-slate-400">Tu locutor personal para transmisiones en vivo</p>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <section class="glass p-6 rounded-2xl space-y-4">
                <h2 class="text-xl font-semibold flex items-center gap-2 text-blue-400">Perfil de Transmisión</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Streamer</label>
                        <input type="text" id="streamerName" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 outline-none focus:border-blue-500 transition-colors" placeholder="Elizabeth">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Juego</label>
                        <input type="text" id="gameName" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 outline-none focus:border-blue-500 transition-colors" placeholder="Minecraft">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Motor de Voz</label>
                        <select id="voiceEngine" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 outline-none focus:border-blue-500 transition-colors" onchange="updateVoiceList()">
                            <option value="google">Google AI (Natural)</option>
                            <option value="elevenlabs">ElevenLabs (Premium)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Voz</label>
                        <select id="voiceId" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 outline-none focus:border-blue-500 transition-colors"></select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Instrucciones Extra</label>
                    <textarea id="extraInstructions" rows="2" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 outline-none text-sm focus:border-blue-500 transition-colors" placeholder="Ej. Estilo FM nocturno, menciona que estamos sorteando algo..."></textarea>
                </div>
            </section>

            <section class="glass p-6 rounded-2xl space-y-4">
                <h2 class="text-xl font-semibold flex items-center gap-2 text-purple-400">Lista de Reproducción</h2>
                <div class="border-2 border-dashed border-slate-700 rounded-xl p-4 text-center relative cursor-pointer hover:border-purple-500 transition-colors group">
                    <input type="file" id="musicFiles" multiple accept="audio/mpeg, audio/mp3" class="absolute inset-0 opacity-0 cursor-pointer">
                    <p id="uploadPrompt" class="text-slate-400 group-hover:text-purple-400 text-sm">Añadir canciones (.mp3)</p>
                </div>
                <div id="playlist" class="max-h-56 overflow-y-auto space-y-2 pr-2 border-t border-slate-800 pt-2 text-slate-300"></div>
            </section>
        </main>

        <footer class="glass p-6 rounded-2xl shadow-2xl">
            <div id="statusBox" class="hidden mb-4 p-3 bg-blue-900/30 border border-blue-500/50 rounded-lg text-sm flex items-center justify-between">
                <span id="statusMessage">Cargando...</span>
                <div class="audio-wave"><div class="bar" style="animation-delay: 0.1s"></div><div class="bar" style="animation-delay: 0.2s"></div><div class="bar" style="animation-delay: 0.3s"></div></div>
            </div>

            <div class="flex flex-col space-y-4">
                <div class="text-center overflow-hidden">
                    <p id="nowPlaying" class="font-bold text-xl text-white truncate">Radio en Espera</p>
                    <p id="trackDetails" class="text-sm text-slate-400">Carga archivos y dale al Play</p>
                </div>

                <div class="flex items-center justify-center gap-6">
                    <button id="prevBtn" class="p-3 rounded-full hover:bg-slate-800 text-slate-400 hover:text-white transition-all disabled:opacity-30">
                        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"></path></svg>
                    </button>
                    
                    <button id="mainPlayBtn" class="bg-blue-600 hover:bg-blue-500 text-white p-5 rounded-full shadow-lg transform active:scale-95 transition-all disabled:bg-slate-700">
                        <div id="playIcon">
                            <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                        </div>
                        <div id="pauseIcon" class="hidden">
                            <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg>
                        </div>
                    </button>

                    <button id="nextBtn" class="p-3 rounded-full hover:bg-slate-800 text-slate-400 hover:text-white transition-all disabled:opacity-30">
                        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"></path></svg>
                    </button>
                </div>
            </div>
            <audio id="audioPlayer" class="hidden"></audio>
        </footer>
    </div>

    <script>
        // Nota: Asegúrate de que las API KEYS estén configuradas o se pasen correctamente.
        const API_KEY = ""; // Gemini & Google TTS
        const ELEVEN_KEY = "sk_31d845ebfc082c303d5f166ce45af9211a4251b14aca1604";

        const voices = {
            google: [
                { id: "Kore", name: "Kore (Femenina)" },
                { id: "Zephyr", name: "Zephyr (Masculina)" },
                { id: "Charon", name: "Charon (Profunda)" }
            ],
            elevenlabs: [
                { id: "pNInz6obpgDQGcFmaJgB", name: "Adam (Masculina)" },
                { id: "Xb7hH9S3oU4shU66pScB", name: "Alice (Femenina)" }
            ]
        };

        const audioPlayer = document.getElementById('audioPlayer');
        const mainPlayBtn = document.getElementById('mainPlayBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        let playlist = [];
        let currentIndex = -1;
        let isLocutionActive = false;

        function updateVoiceList() {
            const engine = document.getElementById('voiceEngine').value;
            const select = document.getElementById('voiceId');
            select.innerHTML = voices[engine].map(v => `<option value="${v.id}">${v.name}</option>`).join('');
        }

        document.getElementById('musicFiles').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => playlist.push({ name: file.name.replace(/\.[^/.]+$/, ""), blobUrl: URL.createObjectURL(file) }));
            renderPlaylist();
            mainPlayBtn.disabled = playlist.length === 0;
        });

        function renderPlaylist() {
            document.getElementById('playlist').innerHTML = playlist.map((s, i) => `
                <div class="p-2 rounded border border-slate-700/50 text-xs flex justify-between items-center transition-all ${i === currentIndex ? 'active-track' : 'bg-slate-800/30'}">
                    <span class="truncate">${s.name}</span><span class="text-blue-500 font-bold">#${i+1}</span>
                </div>
            `).join('');
        }

        async function playTrack(direction = 1) {
            if (playlist.length === 0) return;
            
            currentIndex = (currentIndex + direction + playlist.length) % playlist.length;
            renderPlaylist();
            
            const song = playlist[currentIndex];
            const engine = document.getElementById('voiceEngine').value;
            const voiceId = document.getElementById('voiceId').value;
            const streamer = document.getElementById('streamerName').value || "Elizabeth";
            const game = document.getElementById('gameName').value || "su directo";

            try {
                isLocutionActive = true;
                setUI(true, "La IA está preparando tu entrada...");
                
                const scriptText = await generateScript(streamer, game, song.name);
                let audioUrl;
                
                if (engine === 'google') {
                    audioUrl = await generateGoogleTTS(scriptText, voiceId);
                } else {
                    const blob = await generateElevenLabsAudio(scriptText, voiceId);
                    audioUrl = URL.createObjectURL(blob);
                }

                document.getElementById('nowPlaying').innerText = `🎙️ Presentando...`;
                document.getElementById('trackDetails').innerText = song.name;
                
                audioPlayer.src = audioUrl;
                await audioPlayer.play();
                togglePlayIcons(false);

                audioPlayer.onended = () => {
                    isLocutionActive = false;
                    document.getElementById('nowPlaying').innerText = `🎵 En el aire`;
                    setUI(false);
                    audioPlayer.src = song.blobUrl;
                    audioPlayer.play();
                    
                    audioPlayer.onended = () => playTrack(1);
                };
            } catch (error) {
                console.error("Fallo en la IA:", error);
                setUI(false);
                isLocutionActive = false;
                audioPlayer.src = song.blobUrl;
                audioPlayer.play();
            }
        }

        mainPlayBtn.addEventListener('click', () => {
            if (currentIndex === -1 && playlist.length > 0) {
                playTrack(1);
            } else if (audioPlayer.paused) {
                audioPlayer.play();
                togglePlayIcons(false);
            } else {
                audioPlayer.pause();
                togglePlayIcons(true);
            }
        });

        nextBtn.addEventListener('click', () => playTrack(1));
        prevBtn.addEventListener('click', () => playTrack(-1));

        function togglePlayIcons(paused) {
            playIcon.classList.toggle('hidden', !paused);
            pauseIcon.classList.toggle('hidden', paused);
        }

        async function generateScript(streamer, game, song) {
            const extra = document.getElementById('extraInstructions').value;
            const prompt = `Actúa como un locutor de radio profesional con mucha energía. Dale la bienvenida a los espectadores del canal de ${streamer}. Menciona que estamos viendo un gran stream de ${game}. Haz una transición épica hacia la siguiente canción que se llama "${song}". ${extra}. Sé extenso y cálido, usa entre 30 y 45 palabras.`;
            
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function generateGoogleTTS(text, voiceName) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }],
                    generationConfig: { 
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } }
                    }
                })
            });
            const data = await res.json();
            const pcmBase64 = data.candidates[0].content.parts[0].inlineData.data;
            return pcmToWavUrl(pcmBase64, 24000);
        }

        function pcmToWavUrl(base64, sampleRate) {
            const binary = atob(base64);
            const buffer = new ArrayBuffer(44 + binary.length);
            const view = new DataView(buffer);
            const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + binary.length, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, binary.length, true);
            for (let i = 0; i < binary.length; i++) view.setUint8(44 + i, binary.charCodeAt(i));
            return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
        }

        async function generateElevenLabsAudio(text, voiceId) {
            const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'xi-api-key': ELEVEN_KEY },
                body: JSON.stringify({ text, model_id: "eleven_multilingual_v2" })
            });
            if (!res.ok) throw new Error("Error en ElevenLabs");
            return await res.blob();
        }

        function setUI(show, msg) {
            const box = document.getElementById('statusBox');
            box.classList.toggle('hidden', !show);
            document.getElementById('statusMessage').innerText = msg;
        }

        updateVoiceList();
    </script>
</body>
</html>
