<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio Host Studio - Elizabeth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #050505; color: white; margin: 0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 25, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-border { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 0 20px rgba(168, 85, 247, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const apiKey = "AIzaSyApkkp1hMsopejJzV5sDXzpcdY0wWHjJT0"; 

            const [streamerName, setStreamerName] = useState('Elizabeth');
            const [currentGame, setCurrentGame] = useState('League of Legends');
            const [customInstructions, setCustomInstructions] = useState('¡Saluda con mucha energía y emoción!');
            const [isGenerating, setIsGenerating] = useState(false);
            const [playlist, setPlaylist] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [error, setError] = useState('');
            
            const audioRef = useRef(null);

            const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) {
                            const errData = await response.json();
                            const msg = errData.error?.message || `Error ${response.status}`;
                            if (response.status === 429) throw new Error("Límite de la API alcanzado. Espera un momento.");
                            throw new Error(msg);
                        }
                        return await response.json();
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(r => setTimeout(r, backoff * Math.pow(2, i)));
                    }
                }
            };

            const handleFilesUpload = (e) => {
                const files = Array.from(e.target.files);
                const newTracks = files.map(file => ({
                    id: crypto.randomUUID(),
                    title: file.name.replace(/\.[^/.]+$/, ""),
                    url: URL.createObjectURL(file)
                }));
                setPlaylist(prev => [...prev, ...newTracks]);
                if (currentIndex === null && newTracks.length > 0) setCurrentIndex(0);
            };

            const togglePlay = () => {
                if (currentIndex === null) return;
                isPlaying ? audioRef.current.pause() : audioRef.current.play();
                setIsPlaying(!isPlaying);
            };

            const pcmToWav = (pcmData, sampleRate) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + pcmData.length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmData.length * 2, true);
                let offset = 44;
                for (let i = 0; i < pcmData.length; i++, offset += 2) view.setInt16(offset, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const generatePresentation = async () => {
                if (isGenerating || currentIndex === null) return;
                setIsGenerating(true);
                setError('');

                const track = playlist[currentIndex];
                const systemPrompt = `Eres un locutor de radio profesional y enérgico para el stream de ${streamerName}. 
                Están jugando ${currentGame}. Instrucción: ${customInstructions}. 
                Debes presentar la canción "${track.title}" con estilo de radio FM. 
                Dura exactamente 12-15 segundos. No digas que eres una IA. ¡Habla a la audiencia con carisma!`;
                
                try {
                    // Usamos modelos v1beta para mayor compatibilidad con TTS en preview
                    const textRes = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Genera el guion de presentación de radio." }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    const script = textRes.candidates?.[0]?.content?.parts?.[0]?.text || "¡Suban el volumen!";

                    const ttsRes = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: script }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            }
                        })
                    });

                    const pcm64 = ttsRes.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if (pcm64) {
                        const binary = atob(pcm64);
                        const pcm = new Int16Array(binary.length / 2);
                        for (let i = 0; i < pcm.length; i++) pcm[i] = (binary.charCodeAt(i*2)&0xff)|(binary.charCodeAt(i*2+1)<<8);
                        const audio = new Audio(URL.createObjectURL(pcmToWav(pcm, 24000)));
                        audio.play();
                    }
                } catch (e) {
                    setError(e.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="glass p-10 rounded-[3.5rem] w-full max-w-4xl shadow-2xl flex flex-col md:flex-row gap-10 neon-border">
                        <div className="flex-1 space-y-6">
                            <div>
                                <h1 className="text-4xl font-black italic tracking-tighter uppercase">RADIO <span className="text-purple-500">STUDIO</span></h1>
                                <p className="text-zinc-500 text-[10px] font-bold tracking-[0.4em] uppercase">Elizabeth Live Broadcast</p>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Streamer</label>
                                    <input type="text" value={streamerName} onChange={e=>setStreamerName(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 text-sm outline-none focus:border-purple-600 transition-all"/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Juego</label>
                                    <input type="text" value={currentGame} onChange={e=>setCurrentGame(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 text-sm outline-none focus:border-purple-600 transition-all"/>
                                </div>
                            </div>
                            <div className="bg-zinc-950/50 p-5 rounded-[2rem] border border-zinc-900">
                                <label className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block mb-3">Subir Música (MP3)</label>
                                <input type="file" accept="audio/mpeg" multiple onChange={handleFilesUpload} className="text-xs text-zinc-400 file:bg-purple-600 file:text-white file:border-0 file:rounded-full file:px-5 file:py-2 file:mr-4 hover:file:bg-purple-500 cursor-pointer w-full"/>
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Directrices</label>
                                <textarea value={customInstructions} onChange={e=>setCustomInstructions(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-3xl px-4 py-4 text-sm outline-none focus:border-purple-600 resize-none h-24"></textarea>
                            </div>
                            <button onClick={generatePresentation} disabled={isGenerating || currentIndex === null} className={`w-full py-6 rounded-[2.5rem] font-black text-sm uppercase tracking-[0.2em] transition-all shadow-lg ${isGenerating ? 'bg-zinc-800 text-zinc-600 animate-pulse' : 'bg-purple-600 hover:bg-purple-500 text-white active:scale-95 shadow-purple-900/20'}`}>
                                {isGenerating ? 'GENERANDO...' : 'PRESENTAR CANCIÓN'}
                            </button>
                            {error && <p className="text-red-500 text-[10px] font-bold text-center uppercase tracking-widest bg-red-500/10 py-2 rounded-xl border border-red-500/20">{error}</p>}
                        </div>
                        <div className="w-full md:w-80 flex flex-col bg-zinc-950/30 rounded-[3rem] border border-zinc-800 overflow-hidden">
                            <div className="p-6 border-b border-zinc-800/50 flex justify-between items-center">
                                <span className="text-[11px] font-black text-zinc-500 uppercase tracking-widest">Playlist</span>
                                <span className="bg-purple-600/20 text-purple-400 px-3 py-1 rounded-full text-[10px] font-bold">{playlist.length}</span>
                            </div>
                            <div className="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-2 h-[300px]">
                                {playlist.length === 0 ? (
                                    <div className="h-full flex items-center justify-center opacity-20 italic text-xs uppercase tracking-tighter">Sube un archivo mp3</div>
                                ) : (
                                    playlist.map((t, i) => (
                                        <div key={t.id} onClick={()=>{setCurrentIndex(i); setIsPlaying(true);}} className={`p-4 rounded-2xl cursor-pointer transition-all border ${currentIndex === i ? 'bg-purple-950/20 border-purple-500/30' : 'border-transparent hover:bg-white/5'}`}>
                                            <p className={`text-xs font-bold truncate ${currentIndex === i ? 'text-purple-400' : 'text-zinc-500'}`}>{t.title}</p>
                                        </div>
                                    ))
                                )}
                            </div>
                            <div className="p-6 bg-zinc-900/40 border-t border-zinc-800/50">
                                <div className="flex items-center gap-4">
                                    <button onClick={togglePlay} className="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 active:scale-90 transition-all shadow-xl">
                                        {isPlaying ? (
                                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                                        ) : (
                                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" className="ml-1"><path d="M5 3l14 9-14 9V3z"/></svg>
                                        )}
                                    </button>
                                    <div className="flex-1 overflow-hidden">
                                        <p className="text-[9px] text-purple-500 font-black uppercase tracking-[0.2em] animate-pulse">On Air</p>
                                        <p className="text-[11px] font-bold truncate uppercase">{currentIndex !== null ? playlist[currentIndex].title : "Transmisión Off"}</p>
                                    </div>
                                </div>
                                {currentIndex !== null && <audio ref={audioRef} src={playlist[currentIndex].url} onEnded={() => setCurrentIndex((currentIndex + 1) % playlist.length)} className="hidden" />}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
