<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Radio Host - Live Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .glass { background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(63, 63, 70, 0.5); }
        .player-container { min-height: 152px; transition: all 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [streamerName, setStreamerName] = useState('Elizabeth');
            const [currentGame, setCurrentGame] = useState('League of Legends');
            const [customInstructions, setCustomInstructions] = useState('¡Saluda al chat con energía!');
            const [playlistUrl, setPlaylistUrl] = useState('');
            const [embedUrl, setEmbedUrl] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const apiKey = ""; 

            useEffect(() => {
                if (!playlistUrl) {
                    setEmbedUrl('');
                    return;
                }
                if (playlistUrl.includes('spotify.com')) {
                    const id = playlistUrl.split('/').pop().split('?')[0];
                    const type = playlistUrl.includes('playlist') ? 'playlist' : 'track';
                    setEmbedUrl(`https://open.spotify.com/embed/${type}/${id}?utm_source=generator&theme=0`);
                } else if (playlistUrl.includes('youtube.com') || playlistUrl.includes('youtu.be')) {
                    let id = "";
                    if (playlistUrl.includes('v=')) {
                        id = playlistUrl.split('v=')[1].split('&')[0];
                    } else {
                        id = playlistUrl.split('/').pop();
                    }
                    setEmbedUrl(`https://www.youtube.com/embed/${id}`);
                }
            }, [playlistUrl]);

            const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (retries > 0) {
                        await new Promise(resolve => setTimeout(resolve, backoff));
                        return fetchWithRetry(url, options, retries - 1, backoff * 2);
                    }
                    throw error;
                }
            };

            const pcmToWav = (pcmData, sampleRate) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + pcmData.length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmData.length * 2, true);
                let offset = 44;
                for (let i = 0; i < pcmData.length; i++, offset += 2) view.setInt16(offset, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const generatePresentation = async () => {
                if (isGenerating) return;
                setIsGenerating(true);
                setErrorMsg('');

                const systemPrompt = `Eres un locutor de radio para el stream de ${streamerName}. Están jugando ${currentGame}. Instrucción: ${customInstructions}. Presenta la siguiente canción con mucha energía en 15 segundos.`;
                
                try {
                    const textData = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Presenta la música." }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    const script = textData.candidates?.[0]?.content?.parts?.[0]?.text || "¡Disfruta la música!";

                    const ttsData = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: script }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            }
                        })
                    });

                    const pcmBase64 = ttsData.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    
                    if (pcmBase64) {
                        const pcmBinary = atob(pcmBase64);
                        const pcmArray = new Int16Array(pcmBinary.length / 2);
                        for (let i = 0; i < pcmArray.length; i++) {
                            pcmArray[i] = (pcmBinary.charCodeAt(i * 2) & 0xff) | (pcmBinary.charCodeAt(i * 2 + 1) << 8);
                        }
                        const wavBlob = pcmToWav(pcmArray, 24000);
                        const audio = new Audio(URL.createObjectURL(wavBlob));
                        audio.play();
                    }
                } catch (e) {
                    setErrorMsg('Error de conexión con la IA. Reintenta en unos segundos.');
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="w-full max-w-lg p-4">
                    <div className="glass p-8 rounded-[3rem] shadow-2xl">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-black tracking-tighter uppercase italic">RADIO <span className="text-purple-500">HOST</span></h1>
                            <p className="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.3em]">AI Stream Assistant</p>
                        </div>

                        <div className="space-y-4 mb-6">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase block mb-1">Nombre</label>
                                    <input type="text" value={streamerName} onChange={(e) => setStreamerName(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm text-white outline-none focus:border-purple-600 transition-colors"/>
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase block mb-1">Juego</label>
                                    <input type="text" value={currentGame} onChange={(e) => setCurrentGame(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm text-white outline-none focus:border-purple-600 transition-colors"/>
                                </div>
                            </div>
                            
                            <div>
                                <label className="text-[10px] font-bold text-zinc-500 uppercase block mb-1">Enlace de Playlist (Spotify/YouTube)</label>
                                <input 
                                    type="text" 
                                    placeholder="Pega el link aquí para cargar música" 
                                    value={playlistUrl} 
                                    onChange={(e) => setPlaylistUrl(e.target.value)} 
                                    className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm text-white outline-none focus:border-purple-600 transition-colors"
                                />
                            </div>

                            <div>
                                <label className="text-[10px] font-bold text-zinc-500 uppercase block mb-1">Instrucciones Locutor</label>
                                <textarea value={customInstructions} onChange={(e) => setCustomInstructions(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm text-white outline-none focus:border-purple-600 resize-none h-20"></textarea>
                            </div>
                        </div>

                        <div className="player-container bg-zinc-950 rounded-[2rem] border border-zinc-800 mb-8 overflow-hidden flex flex-col items-center justify-center relative">
                            {embedUrl ? (
                                <iframe 
                                    src={embedUrl} 
                                    width="100%" 
                                    height={playlistUrl.includes('spotify') ? "152" : "280"} 
                                    frameBorder="0" 
                                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                                    loading="lazy"
                                    className="rounded-[2rem]"
                                ></iframe>
                            ) : (
                                <div className="p-10 text-center">
                                    <div className="w-12 h-12 border-2 border-zinc-800 rounded-full flex items-center justify-center mx-auto mb-3">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-zinc-700"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                                    </div>
                                    <p className="text-zinc-600 text-xs font-bold uppercase tracking-widest">Sin música cargada</p>
                                </div>
                            )}
                        </div>

                        {errorMsg && <p className="text-red-500 text-[10px] text-center mb-4 uppercase font-bold">{errorMsg}</p>}

                        <button 
                            onClick={generatePresentation}
                            disabled={isGenerating}
                            className={`w-full py-5 rounded-[2rem] font-black text-lg tracking-widest transition-all shadow-xl ${isGenerating ? 'bg-zinc-800 text-zinc-600 animate-pulse' : 'bg-purple-600 hover:bg-purple-500 text-white shadow-purple-900/30 active:scale-95'}`}
                        >
                            {isGenerating ? 'GENERANDO VOZ...' : 'LANZAR INTRO IA'}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
