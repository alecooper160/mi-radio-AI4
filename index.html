<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Radio Host for Streamers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .audio-wave { display: flex; align-items: center; gap: 2px; height: 20px; }
        .bar { width: 3px; background: #3b82f6; animation: wave 1s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { height: 5px; } 50% { height: 20px; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">AI Radio Host</h1>
            <p class="text-slate-400">Presenta tus canciones como un profesional del aire</p>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Configuración del Streamer -->
            <section class="glass p-6 rounded-2xl space-y-4">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                    Perfil de Transmisión
                </h2>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Nombre del Streamer</label>
                    <input type="text" id="streamerName" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ej. LobaStreamer">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Juego Actual</label>
                    <input type="text" id="gameName" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ej. Minecraft, Valorant...">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Voz de la IA (ElevenLabs)</label>
                    <select id="voiceId" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="21m00Tcm4llvDq8ikWAM">Rachel (Femenina - Versátil)</option>
                        <option value="ErXwVqcDNo3uWpY6F8rO">Antoni (Masculina - Radio)</option>
                        <option value="AZnzlk1XhkDqr7uMeb9W">Nicole (Suave)</option>
                        <option value="D38z5qw9p2LHMp40D0iB">Clyde (Narrador)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Instrucciones Extra (Opcional)</label>
                    <textarea id="extraInstructions" rows="2" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Ej. Saluda al chat, di que hace calor, sé muy entusiasta..."></textarea>
                </div>
            </section>

            <!-- Carga de Archivos -->
            <section class="glass p-6 rounded-2xl space-y-4">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" /></svg>
                    Biblioteca de Música
                </h2>
                <div class="border-2 border-dashed border-slate-700 rounded-xl p-8 text-center hover:border-purple-500 transition-colors cursor-pointer relative">
                    <input type="file" id="musicFiles" multiple accept="audio/mp3" class="absolute inset-0 opacity-0 cursor-pointer">
                    <p class="text-slate-400">Haz clic o arrastra tus archivos MP3 aquí</p>
                </div>
                <div id="playlist" class="max-h-48 overflow-y-auto space-y-2 pr-2">
                    <!-- Canciones cargadas aparecerán aquí -->
                </div>
            </section>
        </main>

        <!-- Player & Status -->
        <footer class="glass p-6 rounded-2xl">
            <div id="statusBox" class="hidden mb-4 p-3 bg-blue-900/30 border border-blue-500/50 rounded-lg text-sm flex items-center justify-between">
                <span id="statusMessage">Generando locución...</span>
                <div class="audio-wave">
                    <div class="bar" style="animation-delay: 0.1s"></div>
                    <div class="bar" style="animation-delay: 0.2s"></div>
                    <div class="bar" style="animation-delay: 0.3s"></div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row items-center gap-4">
                <div class="flex-1 text-center md:text-left">
                    <p id="nowPlaying" class="font-bold text-lg text-slate-100">Esperando selección...</p>
                    <p id="trackDetails" class="text-sm text-slate-400">Selecciona una canción para comenzar la magia.</p>
                </div>
                <div class="flex gap-4">
                    <button id="playBtn" disabled class="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white px-8 py-3 rounded-full font-bold shadow-lg transition-all transform active:scale-95">
                        REPRODUCIR SIGUIENTE
                    </button>
                </div>
            </div>
            <audio id="audioPlayer" class="hidden"></audio>
        </footer>
    </div>

    <!-- Modales de Error -->
    <div id="errorModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 p-6 rounded-xl max-w-sm w-full border border-red-500">
            <h3 class="text-xl font-bold text-red-400 mb-2">¡Ups!</h3>
            <p id="errorMessage" class="text-slate-300 text-sm mb-4"></p>
            <button onclick="closeError()" class="w-full bg-slate-700 hover:bg-slate-600 py-2 rounded-lg">Cerrar</button>
        </div>
    </div>

    <script>
        const API_KEY = ""; // Gemini API Key (Empty for runtime inject)
        const EL_API_KEY = "sk_31d845ebfc082c303d5f166ce45af9211a4251b14aca1604";
        
        const musicInput = document.getElementById('musicFiles');
        const playlistContainer = document.getElementById('playlist');
        const playBtn = document.getElementById('playBtn');
        const audioPlayer = document.getElementById('audioPlayer');
        const statusBox = document.getElementById('statusBox');
        const statusMessage = document.getElementById('statusMessage');
        const nowPlayingText = document.getElementById('nowPlaying');
        const trackDetails = document.getElementById('trackDetails');

        let playlist = [];
        let currentIndex = -1;

        // --- File Handling ---
        musicInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const song = {
                    name: file.name.replace('.mp3', ''),
                    file: file,
                    url: URL.createObjectURL(file)
                };
                playlist.push(song);
                renderPlaylist();
            });
            if (playlist.length > 0) playBtn.disabled = false;
        });

        function renderPlaylist() {
            playlistContainer.innerHTML = playlist.map((song, idx) => `
                <div class="flex items-center justify-between p-2 rounded-lg bg-slate-800/50 hover:bg-slate-700/50 transition-colors">
                    <span class="text-sm truncate max-w-[200px]">${song.name}</span>
                    <button onclick="removeSong(${idx})" class="text-slate-500 hover:text-red-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
            `).join('');
        }

        function removeSong(idx) {
            playlist.splice(idx, 1);
            renderPlaylist();
            if (playlist.length === 0) playBtn.disabled = true;
        }

        // --- Logic Flow ---
        playBtn.addEventListener('click', async () => {
            if (playlist.length === 0) return;
            
            currentIndex = (currentIndex + 1) % playlist.length;
            const song = playlist[currentIndex];
            const streamer = document.getElementById('streamerName').value || "el Streamer";
            const game = document.getElementById('gameName').value || "su juego favorito";
            const extra = document.getElementById('extraInstructions').value;
            const voiceId = document.getElementById('voiceId').value;

            setUIState(true, `Generando guion para "${song.name}"...`);

            try {
                // 1. Generate Script with Gemini
                const script = await generateScript(streamer, game, song.name, extra);
                
                // 2. TTS with ElevenLabs
                setUIState(true, `La IA está grabando la locución...`);
                const ttsBlob = await fetchElevenLabsTTS(script, voiceId);
                const ttsUrl = URL.createObjectURL(ttsBlob);

                // 3. Playback Sequence
                playBtn.disabled = true;
                nowPlayingText.innerText = `🎙️ Presentando: ${song.name}`;
                trackDetails.innerText = `Locutor IA en acción...`;

                audioPlayer.src = ttsUrl;
                audioPlayer.play();

                audioPlayer.onended = () => {
                    nowPlayingText.innerText = `🎵 Sonando: ${song.name}`;
                    trackDetails.innerText = `Sintonizando con ${streamer}`;
                    audioPlayer.src = song.url;
                    audioPlayer.play();
                    audioPlayer.onended = () => {
                        setUIState(false);
                        playBtn.disabled = false;
                        nowPlayingText.innerText = "Fin de la canción";
                        trackDetails.innerText = "Listo para el siguiente track.";
                    };
                };

            } catch (error) {
                console.error(error);
                showError("No se pudo procesar la locución. Revisa tu conexión o créditos de API.");
                setUIState(false);
                playBtn.disabled = false;
            }
        });

        // --- API Helpers ---

        async function generateScript(streamer, game, song, extra) {
            const prompt = `Eres un locutor de radio profesional, carismático y dinámico. 
            Debes presentar al streamer "${streamer}" que está jugando a "${game}". 
            Presenta la siguiente canción: "${song}". 
            Contexto adicional: ${extra}. 
            Tu guion debe ser corto (máximo 25 palabras), sonar natural y terminar con una frase que de paso a la música. 
            SOLO escribe el texto que dirá el locutor, nada más.`;

            const systemPrompt = "Eres un guionista de radio experto.";

            try {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "¡A continuación, música!";
            } catch (e) {
                return `¡Hola a todos! Aquí acompañando a ${streamer} en ${game}. ¡Disfruten de este temazo: ${song}!`;
            }
        }

        async function fetchElevenLabsTTS(text, voiceId) {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                method: 'POST',
                headers: {
                    'xi-api-key': EL_API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_multilingual_v2",
                    voice_settings: { stability: 0.5, similarity_boost: 0.75 }
                })
            });

            if (!response.ok) throw new Error("ElevenLabs Error");
            return await response.blob();
        }

        async function fetchWithRetry(url, options, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (res.ok) return res;
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        // --- UI Utilities ---
        function setUIState(loading, msg = "") {
            if (loading) {
                statusBox.classList.remove('hidden');
                statusMessage.innerText = msg;
            } else {
                statusBox.classList.add('hidden');
            }
        }

        function showError(msg) {
            document.getElementById('errorMessage').innerText = msg;
            document.getElementById('errorModal').classList.remove('hidden');
        }

        function closeError() {
            document.getElementById('errorModal').classList.add('hidden');
        }
    </script>
</body>
</html>
