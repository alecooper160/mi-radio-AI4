<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Radio Host - Elizabeth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .on-air-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
        .debug-panel { background: #000; font-family: 'Courier New', monospace; font-size: 11px; color: #10b981; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-extrabold text-blue-400 tracking-tighter uppercase">Elizabeth AI Station</h1>
            <p class="text-slate-400">Locución Dinámica Segura (Gemini 2.5 Flash)</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1 space-y-4">
                <!-- Panel de Control -->
                <section class="glass p-6 rounded-2xl border border-white/5">
                    <h2 class="font-bold mb-4 text-blue-300 text-xs tracking-widest uppercase">Ajustes de Emisión</h2>
                    <div class="space-y-4 text-sm">
                        <div>
                            <label class="block text-[10px] text-slate-500 mb-1 font-bold uppercase tracking-widest">Usuario</label>
                            <input type="text" id="userName" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none focus:border-blue-500 transition-colors" value="Elizabeth">
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-500 mb-1 font-bold uppercase tracking-widest">Videojuego</label>
                            <input type="text" id="gameName" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none focus:border-blue-500 transition-colors" value="Forza 5">
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-500 mb-1 font-bold uppercase tracking-widest">Personalidad de Voz</label>
                            <select id="voiceSelect" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none focus:border-blue-500 transition-colors">
                                <option value="Kore">Kore (Neutral)</option>
                                <option value="Zephyr">Zephyr (Enérgico)</option>
                                <option value="Callirrhoe">Callirrhoe (Elegante)</option>
                                <option value="Puck">Puck (Juvenil)</option>
                                <option value="Charon">Charon (Deep)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-500 mb-1 font-bold uppercase tracking-widest">Contexto Extra</label>
                            <textarea id="extraPrompt" rows="3" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none focus:border-blue-500 transition-colors" placeholder="Ej: Es viernes por la noche..."></textarea>
                        </div>
                    </div>
                </section>

                <section class="glass p-6 rounded-2xl border border-white/5">
                    <h2 class="font-bold mb-4 text-blue-300 text-xs tracking-widest uppercase">Biblioteca Musical</h2>
                    <input type="file" id="fileInput" class="text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer" accept="audio/mp3" multiple>
                </section>
            </div>

            <!-- Reproductor Principal -->
            <div class="md:col-span-2 space-y-4">
                <div class="glass p-10 rounded-[2.5rem] text-center relative border border-blue-500/30 overflow-hidden">
                    <div id="statusIndicator" class="absolute top-6 right-6 flex items-center gap-2 opacity-0 transition-opacity duration-500">
                        <span class="h-2 w-2 rounded-full bg-red-600 on-air-pulse shadow-[0_0_12px_red]"></span>
                        <span class="text-[10px] font-black text-red-500 uppercase tracking-widest">Al Aire</span>
                    </div>

                    <div class="w-44 h-44 bg-slate-800 rounded-3xl mx-auto mb-8 flex items-center justify-center border border-slate-700 shadow-inner">
                        <span class="text-6xl" id="artIcon">🎙️</span>
                    </div>

                    <h3 id="currentTitle" class="text-2xl font-black mb-2 uppercase tracking-tight truncate px-6">Sin pistas cargadas</h3>
                    <p id="currentArtist" class="text-slate-500 text-sm mb-10 tracking-widest font-bold uppercase">Elizabeth Radio Station</p>

                    <div class="flex items-center justify-center gap-12">
                        <button id="prevBtn" class="text-2xl opacity-40 hover:opacity-100 transition-all">⏮️</button>
                        <button id="playBtn" class="w-24 h-24 bg-blue-600 rounded-full flex items-center justify-center text-4xl shadow-[0_0_30px_rgba(37,99,235,0.5)] hover:bg-blue-500 hover:scale-110 active:scale-95 transition-all">▶️</button>
                        <button id="nextBtn" class="text-2xl opacity-40 hover:opacity-100 transition-all">⏭️</button>
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl max-h-48 overflow-y-auto space-y-2" id="playlist">
                    <p class="text-center text-slate-600 text-xs italic py-4">Sube música para comenzar la emisión</p>
                </div>
            </div>
        </div>

        <div class="mt-6 rounded-2xl overflow-hidden border border-slate-800 shadow-2xl">
            <div class="bg-slate-900 px-5 py-3 text-[10px] font-black text-emerald-500 flex justify-between items-center border-b border-slate-800">
                <span class="tracking-[0.2em]">LOG DE CABINA - ELIZABETH RADIO</span>
                <button onclick="document.getElementById('debugOutput').innerText = ''" class="hover:text-white text-[9px]">LIMPIAR</button>
            </div>
            <pre id="debugOutput" class="debug-panel h-48 p-5 overflow-y-auto whitespace-pre-wrap leading-relaxed"></pre>
        </div>
    </div>

    <audio id="musicAudio"></audio>

    <script>
        // La API Key se proporciona automáticamente por el entorno seguro.
        const apiKey = ""; 
        
        let playlist = [];
        let currentIndex = -1;
        let isIAActive = false;

        const musicAudio = document.getElementById('musicAudio');
        const debug = document.getElementById('debugOutput');

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            debug.innerText += `[${time}] ${msg}\n`;
            debug.scrollTop = debug.scrollHeight;
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(f => playlist.push({ 
                name: f.name.replace('.mp3', ''), 
                url: URL.createObjectURL(f) 
            }));
            renderPlaylist();
            if (currentIndex === -1) setTrack(0);
        });

        function renderPlaylist() {
            const container = document.getElementById('playlist');
            container.innerHTML = playlist.length ? '' : '<p class="text-center text-slate-600 text-xs italic py-4">No hay pistas</p>';
            playlist.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = `p-3 text-xs font-bold cursor-pointer rounded-xl transition-all ${i === currentIndex ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30' : 'hover:bg-slate-800 text-slate-400'}`;
                div.innerText = `${String(i+1).padStart(2, '0')}. ${t.name.toUpperCase()}`;
                div.onclick = () => { if(!isIAActive) playWithIA(i); };
                container.appendChild(div);
            });
        }

        function setTrack(i) {
            currentIndex = i;
            musicAudio.src = playlist[i].url;
            document.getElementById('currentTitle').innerText = playlist[i].name;
            document.getElementById('currentArtist').innerText = "EN PAUSA";
        }

        // Función con Exponential Backoff para robustez total
        async function robustFetch(url, payload, retries = 5, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (response.ok) return data;
                    
                    // Si hay error de cuota o servidor, reintentamos
                    if (response.status === 429 || response.status >= 500) {
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                        continue;
                    }
                    throw new Error(data.error?.message || "Error desconocido de API");
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        async function playWithIA(index) {
            if (isIAActive) return;
            setTrack(index);
            isIAActive = true;
            
            document.getElementById('statusIndicator').style.opacity = "1";
            document.getElementById('currentArtist').innerText = "CONECTANDO CON LA CABINA...";

            try {
                // USAMOS EL MODELO GEMINI 2.5 FLASH PREVIEW (SOPORTE AUDIO INTEGRADO)
                const modelId = "gemini-2.5-flash-preview-09-2025";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`;
                
                log(`Iniciando sesión segura con ${modelId}...`);

                const user = document.getElementById('userName').value || "Locutor";
                const game = document.getElementById('gameName').value || "Juego";
                const voice = document.getElementById('voiceSelect').value;
                const extra = document.getElementById('extraPrompt').value;

                const payload = {
                    contents: [{ 
                        parts: [{ 
                            text: `Actúa como Elizabeth, una locutora de radio FM muy profesional y carismática. Estás en vivo para ${user} que juega a ${game}. Presenta la canción "${playlist[index].name}". Contexto adicional: ${extra}. Tu mensaje debe durar menos de 10 segundos. Termina con la frase "¡Dale!". No uses asteriscos ni formato de texto.` 
                        }] 
                    }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { 
                            voiceConfig: { 
                                prebuiltVoiceConfig: { voiceName: voice } 
                            } 
                        }
                    }
                };

                const data = await robustFetch(url, payload);

                const audioPart = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                if (!audioPart) throw new Error("No se pudo obtener el audio de la locución.");

                log(`Recibida locución de Elizabeth. Iniciando transmisión.`);
                const blob = pcmToWavBlob(audioPart.inlineData.data, 24000);
                const ttsAudio = new Audio(URL.createObjectURL(blob));

                ttsAudio.onended = () => {
                    isIAActive = false;
                    document.getElementById('statusIndicator').style.opacity = "0";
                    document.getElementById('currentArtist').innerText = "EN VIVO - MÚSICA";
                    document.getElementById('playBtn').innerText = "⏸️";
                    musicAudio.play();
                };

                await ttsAudio.play();

            } catch (err) {
                log(`FALLO: ${err.message}`);
                isIAActive = false;
                document.getElementById('statusIndicator').style.opacity = "0";
                musicAudio.play();
            }
        }

        // Conversor PCM a WAV necesario para la reproducción de audio de Gemini
        function pcmToWavBlob(base64, rate) {
            const bin = atob(base64);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            const header = new ArrayBuffer(44);
            const dv = new DataView(header);
            const s = (o, str) => { for (let i = 0; i < str.length; i++) dv.setUint8(o + i, str.charCodeAt(i)); };
            s(0, 'RIFF'); dv.setUint32(4, 36 + bytes.length, true); s(8, 'WAVE'); s(12, 'fmt ');
            dv.setUint32(16, 16, true); dv.setUint16(20, 1, true); dv.setUint16(22, 1, true);
            dv.setUint32(24, rate, true); dv.setUint32(28, rate * 2, true); dv.setUint16(32, 2, true);
            dv.setUint16(34, 16, true); s(36, 'data'); dv.setUint32(40, bytes.length, true);
            return new Blob([header, bytes], { type: 'audio/wav' });
        }

        document.getElementById('playBtn').onclick = () => {
            if (isIAActive) return;
            if (musicAudio.paused) {
                if (currentIndex === -1 && playlist.length > 0) playWithIA(0);
                else if (currentIndex !== -1) playWithIA(currentIndex);
            } else {
                musicAudio.pause();
                document.getElementById('playBtn').innerText = "▶️";
            }
        };

        document.getElementById('nextBtn').onclick = () => {
            if (playlist.length > 0) playWithIA((currentIndex + 1) % playlist.length);
        };

        document.getElementById('prevBtn').onclick = () => {
            if (playlist.length > 0) playWithIA((currentIndex - 1 + playlist.length) % playlist.length);
        };

        musicAudio.onended = () => {
            if (playlist.length > 0) document.getElementById('nextBtn').click();
        };
    </script>
</body>
</html>
