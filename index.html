<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Radio Host - Elizabeth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .on-air-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
        .debug-panel { background: #000; font-family: 'Courier New', monospace; font-size: 11px; color: #10b981; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-extrabold text-blue-400 tracking-tighter uppercase">Elizabeth AI Station</h1>
            <p class="text-slate-400">Locución Dinámica (Producción)</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1 space-y-4">
                <section class="glass p-6 rounded-2xl border border-white/5">
                    <h2 class="font-bold mb-4 text-blue-300 text-xs tracking-widest uppercase">Ajustes de Locución</h2>
                    <div class="space-y-3 text-sm">
                        <input type="hidden" id="apiKeyInput" value="AIzaSyApkkp1hMsopejJzV5sDXzpcdY0wWHjJT0">
                        
                        <div>
                            <label class="block text-[10px] text-slate-500 mb-1 font-bold">USUARIO</label>
                            <input type="text" id="userName" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none focus:border-blue-500" value="Ale">
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-500 mb-1 font-bold">JUEGO</label>
                            <input type="text" id="gameName" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none focus:border-blue-500" value="Forza 5">
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-500 mb-1 font-bold">VOZ NATIVA</label>
                            <select id="voiceSelect" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none">
                                <option value="Kore">Kore (Principal)</option>
                                <option value="Zephyr">Zephyr (Enérgico)</option>
                                <option value="Callirrhoe">Callirrhoe (Elegante)</option>
                                <option value="Puck">Puck (Divertido)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-500 mb-1 font-bold">HUMOR / CONTEXTO</label>
                            <textarea id="extraPrompt" rows="3" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none focus:border-blue-500" placeholder="Ej: Elizabeth hoy está sarcástica..."></textarea>
                        </div>
                    </div>
                </section>

                <section class="glass p-6 rounded-2xl border border-white/5">
                    <h2 class="font-bold mb-4 text-blue-300 text-xs tracking-widest uppercase">Cargar Música</h2>
                    <input type="file" id="fileInput" class="text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer" accept="audio/mp3" multiple>
                </section>
            </div>

            <div class="md:col-span-2 space-y-4">
                <div class="glass p-10 rounded-[2.5rem] text-center relative border border-blue-500/30 overflow-hidden">
                    <div id="statusIndicator" class="absolute top-6 right-6 flex items-center gap-2 opacity-0 transition-opacity duration-500">
                        <span class="h-2 w-2 rounded-full bg-red-600 on-air-pulse shadow-[0_0_12px_red]"></span>
                        <span class="text-[10px] font-black text-red-500 uppercase tracking-widest">Al Aire</span>
                    </div>

                    <div class="w-44 h-44 bg-slate-800 rounded-3xl mx-auto mb-8 flex items-center justify-center border border-slate-700 shadow-inner group transition-all">
                        <span class="text-6xl group-hover:scale-110 transition-transform" id="artIcon">🎙️</span>
                    </div>

                    <h3 id="currentTitle" class="text-2xl font-black mb-2 uppercase tracking-tight truncate px-6">Sin música</h3>
                    <p id="currentArtist" class="text-slate-500 text-sm mb-10 tracking-widest font-bold uppercase">LISTA VACÍA</p>

                    <div class="flex items-center justify-center gap-12">
                        <button id="prevBtn" class="text-2xl opacity-40 hover:opacity-100 transition-opacity">⏮️</button>
                        <button id="playBtn" class="w-24 h-24 bg-blue-600 rounded-full flex items-center justify-center text-4xl shadow-[0_0_30px_rgba(37,99,235,0.5)] hover:bg-blue-500 hover:scale-110 active:scale-90 transition-all">▶️</button>
                        <button id="nextBtn" class="text-2xl opacity-40 hover:opacity-100 transition-opacity">⏭️</button>
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl max-h-48 overflow-y-auto space-y-2" id="playlist">
                    <p class="text-center text-slate-600 text-xs italic py-4 font-medium">No hay canciones</p>
                </div>
            </div>
        </div>

        <div class="mt-6 rounded-2xl overflow-hidden border border-slate-800 shadow-2xl">
            <div class="bg-slate-900 px-5 py-3 text-[10px] font-black text-emerald-500 flex justify-between items-center border-b border-slate-800">
                <span class="tracking-[0.2em]">LOG DE CABINA - ELIZABETH RADIO</span>
                <button onclick="document.getElementById('debugOutput').innerText = ''" class="hover:text-white text-[9px]">BORRAR</button>
            </div>
            <pre id="debugOutput" class="debug-panel h-48 p-5 overflow-y-auto whitespace-pre-wrap leading-relaxed"></pre>
        </div>
    </div>

    <audio id="musicAudio"></audio>

    <script>
        const defaultApiKey = "AIzaSyApkkp1hMsopejJzV5sDXzpcdY0wWHjJT0"; 
        let playlist = [];
        let currentIndex = -1;
        let isIAActive = false;

        const musicAudio = document.getElementById('musicAudio');
        const debug = document.getElementById('debugOutput');

        function log(msg, obj = null) {
            const time = new Date().toLocaleTimeString();
            let text = `[${time}] ${msg}\n`;
            if (obj) { try { text += JSON.stringify(obj, null, 2) + "\n"; } catch(e) { text += "[Data]\n"; } }
            debug.innerText += text;
            debug.scrollTop = debug.scrollHeight;
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(f => playlist.push({ name: f.name.replace('.mp3', ''), url: URL.createObjectURL(f) }));
            renderPlaylist();
            if (currentIndex === -1) setTrack(0);
        });

        function renderPlaylist() {
            const container = document.getElementById('playlist');
            container.innerHTML = playlist.length ? '' : '<p class="text-center text-slate-600 text-xs italic py-4">No hay canciones</p>';
            playlist.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = `p-3 text-xs font-bold cursor-pointer rounded-xl transition-all ${i === currentIndex ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30' : 'hover:bg-slate-800 text-slate-400'}`;
                div.innerText = `${String(i+1).padStart(2, '0')}. ${t.name.toUpperCase()}`;
                div.onclick = () => { if(!isIAActive) playWithIA(i); };
                container.appendChild(div);
            });
        }

        function setTrack(i) {
            currentIndex = i;
            musicAudio.src = playlist[i].url;
            document.getElementById('currentTitle').innerText = playlist[i].name;
            document.getElementById('currentArtist').innerText = "LISTO";
        }

        async function playWithIA(index) {
            if (isIAActive) return;
            
            const activeKey = document.getElementById('apiKeyInput').value || defaultApiKey;
            setTrack(index);
            isIAActive = true;
            
            const user = document.getElementById('userName').value || "Ale";
            const game = document.getElementById('gameName').value || "Forza";
            const voice = document.getElementById('voiceSelect').value;
            const extra = document.getElementById('extraPrompt').value;
            
            document.getElementById('statusIndicator').style.opacity = "1";
            document.getElementById('playBtn').innerText = "🎙️";
            document.getElementById('currentArtist').innerText = "ESCRIBIENDO GUION...";

            try {
                // Modelo estable para despliegue público
                const modelName = "gemini-2.0-flash";
                const baseUrl = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${activeKey}`;
                
                log(`Usando modelo: ${modelName}`);

                // PASO 1: Guion
                const textResponse = await fetch(baseUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Eres Elizabeth, una locutora carismática. Usuario: ${user}. Juego: ${game}. Canción: ${playlist[index].name}. Humor: ${extra}. Genera una presentación variada y breve de máximo 15 segundos. Solo el texto. Termina con ¡Dale!` }] }]
                    })
                });

                const textData = await textResponse.json();
                if (textData.error) throw new Error(textData.error.message);

                const script = textData.candidates?.[0]?.content?.parts?.[0]?.text || "¡Disfruta! ¡Dale!";
                log(`Guion: "${script}"`);

                // PASO 2: Audio
                document.getElementById('currentArtist').innerText = "GENERANDO AUDIO...";
                const audioResponse = await fetch(baseUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Di esto exactamente: ${script}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { 
                                voiceConfig: { 
                                    prebuiltVoiceConfig: { voiceName: voice } 
                                } 
                            }
                        }
                    })
                });

                const audioData = await audioResponse.json();
                if (audioData.error) throw new Error(audioData.error.message);

                const audioPart = audioData.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                if (!audioPart) throw new Error("El modelo no devolvió audio binario.");

                const blob = pcmToWavBlob(audioPart.inlineData.data, 24000);
                const ttsAudio = new Audio(URL.createObjectURL(blob));

                ttsAudio.onended = () => {
                    resetUI();
                    musicAudio.play();
                };

                await ttsAudio.play();

            } catch (err) {
                log(`ERROR: ${err.message}`);
                resetUI();
                musicAudio.play();
            }
        }

        function resetUI() {
            isIAActive = false;
            document.getElementById('statusIndicator').style.opacity = "0";
            document.getElementById('playBtn').innerText = "⏸️";
            document.getElementById('currentArtist').innerText = "EN VIVO";
        }

        function pcmToWavBlob(base64, rate) {
            const bin = atob(base64);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            const header = new ArrayBuffer(44);
            const dv = new DataView(header);
            const s = (o, str) => { for (let i = 0; i < str.length; i++) dv.setUint8(o + i, str.charCodeAt(i)); };
            s(0, 'RIFF'); dv.setUint32(4, 36 + bytes.length, true); s(8, 'WAVE'); s(12, 'fmt ');
            dv.setUint32(16, 16, true); dv.setUint16(20, 1, true); dv.setUint16(22, 1, true);
            dv.setUint32(24, rate, true); dv.setUint32(28, rate * 2, true); dv.setUint16(32, 2, true);
            dv.setUint16(34, 16, true); s(36, 'data'); dv.setUint32(40, bytes.length, true);
            return new Blob([header, bytes], { type: 'audio/wav' });
        }

        document.getElementById('playBtn').onclick = () => {
            if (isIAActive) return;
            if (musicAudio.paused) {
                if (currentIndex === -1 && playlist.length > 0) playWithIA(0);
                else if (currentIndex !== -1) playWithIA(currentIndex);
            } else {
                musicAudio.pause();
                document.getElementById('playBtn').innerText = "▶️";
            }
        };

        document.getElementById('nextBtn').onclick = () => playWithIA((currentIndex + 1) % playlist.length);
        document.getElementById('prevBtn').onclick = () => playWithIA((currentIndex - 1 + playlist.length) % playlist.length);
        musicAudio.onended = () => { if (playlist.length > 0) document.getElementById('nextBtn').click(); };
    </script>
</body>
</html>
