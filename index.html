<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Radio Host - Locutor MP3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: black; color: white; margin: 0; font-family: sans-serif; }
        .glass { background: rgba(24, 24, 27, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(63, 63, 70, 0.4); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .active-track { background: rgba(168, 85, 247, 0.1); border-color: rgba(168, 85, 247, 0.4); }
        .neon-glow { box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [streamerName, setStreamerName] = useState('Elizabeth');
            const [currentGame, setCurrentGame] = useState('League of Legends');
            const [customInstructions, setCustomInstructions] = useState('¡Saluda con mucha energía!');
            const [isGenerating, setIsGenerating] = useState(false);
            const [playlist, setPlaylist] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [error, setError] = useState('');
            
            const audioRef = useRef(null);
            const apiKey = ""; 

            // Función de reintento obligatoria para la API
            const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) throw new Error(`Error: ${response.status}`);
                        return await response.json();
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(r => setTimeout(r, backoff * Math.pow(2, i)));
                    }
                }
            };

            const handleFilesUpload = (e) => {
                const files = Array.from(e.target.files);
                const newTracks = files.map(file => ({
                    id: crypto.randomUUID(),
                    title: file.name.replace(/\.[^/.]+$/, ""),
                    artist: "Local Track",
                    url: URL.createObjectURL(file)
                }));
                setPlaylist(prev => [...prev, ...newTracks]);
                if (currentIndex === null && newTracks.length > 0) setCurrentIndex(0);
            };

            const togglePlay = () => {
                if (currentIndex === null) return;
                isPlaying ? audioRef.current.pause() : audioRef.current.play();
                setIsPlaying(!isPlaying);
            };

            useEffect(() => {
                if (currentIndex !== null && isPlaying && audioRef.current) {
                    audioRef.current.play().catch(() => setIsPlaying(false));
                }
            }, [currentIndex]);

            const pcmToWav = (pcmData, sampleRate) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + pcmData.length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmData.length * 2, true);
                let offset = 44;
                for (let i = 0; i < pcmData.length; i++, offset += 2) view.setInt16(offset, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const generatePresentation = async () => {
                if (isGenerating || currentIndex === null) return;
                setIsGenerating(true);
                setError('');

                const currentTrack = playlist[currentIndex];
                const systemPrompt = `Eres un locutor de radio carismático en el stream de ${streamerName}. 
                Contexto: Están jugando ${currentGame}. Instrucción: ${customInstructions}.
                TAREA: Presenta la canción "${currentTrack.title}" de forma épica y profesional.
                Dura máximo 15 segundos. No digas que eres una IA. ¡Habla directamente a la audiencia!`;
                
                try {
                    // 1. Generar el Guion
                    const textData = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Presenta la canción ahora." }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    const script = textData.candidates?.[0]?.content?.parts?.[0]?.text || "¡Suban el volumen!";

                    // 2. Convertir a Voz (TTS)
                    const ttsData = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: script }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            }
                        })
                    });

                    const pcmBase64 = ttsData.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    
                    if (pcmBase64) {
                        const pcmBinary = atob(pcmBase64);
                        const pcmArray = new Int16Array(pcmBinary.length / 2);
                        for (let i = 0; i < pcmArray.length; i++) {
                            pcmArray[i] = (pcmBinary.charCodeAt(i * 2) & 0xff) | (pcmBinary.charCodeAt(i * 2 + 1) << 8);
                        }
                        const wavBlob = pcmToWav(pcmArray, 24000);
                        const aiAudio = new Audio(URL.createObjectURL(wavBlob));
                        aiAudio.volume = 1.0;
                        aiAudio.play();
                    }
                } catch (e) {
                    setError('La cabina de radio está ocupada. Intenta de nuevo.');
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="glass p-8 rounded-[3rem] w-full max-w-3xl shadow-2xl flex flex-col md:flex-row gap-8 neon-glow">
                        
                        <div className="flex-1 space-y-6">
                            <div className="flex items-center gap-3">
                                <div className="w-3 h-3 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_red]"></div>
                                <h1 className="text-3xl font-black tracking-tighter uppercase italic italic">LIVE <span className="text-purple-500">RADIO</span></h1>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block mb-1">Locutor para</label>
                                    <input type="text" value={streamerName} onChange={(e) => setStreamerName(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm outline-none focus:border-purple-600 transition-all"/>
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block mb-1">Juego</label>
                                    <input type="text" value={currentGame} onChange={(e) => setCurrentGame(e.target.value)} className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-2 text-sm outline-none focus:border-purple-600 transition-all"/>
                                </div>
                            </div>

                            <div className="bg-zinc-900/40 p-4 rounded-3xl border border-zinc-800">
                                <label className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block mb-2">Cargar Música (MP3)</label>
                                <input type="file" accept="audio/mpeg" multiple onChange={handleFilesUpload} className="w-full text-xs text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-purple-600 file:text-white hover:file:bg-purple-700 cursor-pointer"/>
                            </div>

                            <textarea value={customInstructions} onChange={(e) => setCustomInstructions(e.target.value)} placeholder="Instrucciones para la IA..." className="w-full bg-black border border-zinc-800 rounded-2xl px-4 py-3 text-sm outline-none focus:border-purple-600 resize-none h-20"></textarea>

                            <button onClick={generatePresentation} disabled={isGenerating || currentIndex === null} className={`w-full py-5 rounded-[2rem] font-black text-sm uppercase tracking-[0.2em] transition-all ${isGenerating ? 'bg-zinc-800 text-zinc-600 animate-pulse' : 'bg-purple-600 hover:bg-purple-500 text-white shadow-lg active:scale-95'}`}>
                                {isGenerating ? 'LOCUTOR GRABANDO...' : 'PRESENTAR CANCIÓN'}
                            </button>
                            {error && <p className="text-red-500 text-[10px] font-bold text-center uppercase tracking-tighter">{error}</p>}
                        </div>

                        <div className="w-full md:w-72 flex flex-col bg-black/40 rounded-[2rem] border border-zinc-800 overflow-hidden">
                            <div className="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/20">
                                <span className="text-[10px] font-bold text-zinc-500 uppercase">Lista de Temas</span>
                                <span className="text-[10px] font-bold text-purple-500">{playlist.length}</span>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto custom-scrollbar h-64 p-2 space-y-1">
                                {playlist.map((track, idx) => (
                                    <div key={track.id} onClick={() => {setCurrentIndex(idx); setIsPlaying(true);}} className={`p-3 rounded-xl cursor-pointer transition-all border border-transparent ${currentIndex === idx ? 'active-track border-purple-500/30' : 'hover:bg-zinc-900'}`}>
                                        <p className={`text-xs font-bold truncate ${currentIndex === idx ? 'text-white' : 'text-zinc-500'}`}>{track.title}</p>
                                    </div>
                                ))}
                            </div>

                            <div className="p-4 bg-zinc-900/50 border-t border-zinc-800">
                                <div className="flex items-center justify-between">
                                    <button onClick={togglePlay} className="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition-all shadow-lg">
                                        {isPlaying ? <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> : <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" className="ml-1"><path d="M5 3l14 9-14 9V3z"/></svg>}
                                    </button>
                                    <div className="text-right overflow-hidden ml-4">
                                        <p className="text-[10px] text-zinc-500 font-bold uppercase truncate">{currentIndex !== null ? playlist[currentIndex].title : "OFF AIR"}</p>
                                    </div>
                                </div>
                                {currentIndex !== null && <audio ref={audioRef} src={playlist[currentIndex].url} onEnded={() => setCurrentIndex((currentIndex + 1) % playlist.length)} className="hidden" />}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
