<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio Host Studio - Elizabeth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #050505; color: white; margin: 0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 25, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-border { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 0 20px rgba(168, 85, 247, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const App = () => {
            const apiKey = "AIzaSyApkkp1hMsopejJzV5sDXzpcdY0wWHjJT0"; 

            const [streamerName, setStreamerName] = useState('Elizabeth');
            const [currentGame, setCurrentGame] = useState('League of Legends');
            const [customInstructions, setCustomInstructions] = useState('¡Saluda con mucha energía!');
            const [isGenerating, setIsGenerating] = useState(false);
            const [playlist, setPlaylist] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(null);
            const [error, setError] = useState('');
            
            const fetchWithRetry = async (url, options, retries = 3) => {
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        const data = await response.json();
                        if (!response.ok) throw new Error(data.error?.message || `Error ${response.status}`);
                        return data;
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(r => setTimeout(r, 1500));
                    }
                }
            };

            const handleFilesUpload = (e) => {
                const files = Array.from(e.target.files);
                const newTracks = files.map(file => ({
                    id: crypto.randomUUID(),
                    title: file.name.replace(/\.[^/.]+$/, ""),
                    url: URL.createObjectURL(file)
                }));
                setPlaylist(prev => [...prev, ...newTracks]);
                if (currentIndex === null && newTracks.length > 0) setCurrentIndex(0);
            };

            const pcmToWav = (pcmData, sampleRate) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + pcmData.length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmData.length * 2, true);
                let offset = 44;
                for (let i = 0; i < pcmData.length; i++, offset += 2) view.setInt16(offset, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const generatePresentation = async () => {
                if (currentIndex === null || isGenerating) return;
                setIsGenerating(true);
                setError('');

                const track = playlist[currentIndex];
                const promptText = `Eres un locutor de radio para el stream de ${streamerName}. Juego: ${currentGame}. Instrucción: ${customInstructions}. Presenta la canción "${track.title}" con estilo profesional en 10 segundos.`;
                
                try {
                    // Texto: Usando el modelo estable gemini-1.5-flash
                    const textRes = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }] }]
                        })
                    });

                    const script = textRes.candidates?.[0]?.content?.parts?.[0]?.text || "¡Suban el volumen!";

                    // Audio: TTS (Mantenemos el modelo TTS específico)
                    const ttsRes = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: script }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            }
                        })
                    });

                    const pcm64 = ttsRes.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if (pcm64) {
                        const binary = atob(pcm64);
                        const pcm = new Int16Array(binary.length / 2);
                        for (let i = 0; i < pcm.length; i++) pcm[i] = (binary.charCodeAt(i*2)&0xff)|(binary.charCodeAt(i*2+1)<<8);
                        const audio = new Audio(URL.createObjectURL(pcmToWav(pcm, 24000)));
                        audio.play();
                    }
                } catch (e) {
                    setError(`Error: ${e.message}.`);
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="glass p-10 rounded-[3.5rem] w-full max-w-4xl shadow-2xl flex flex-col md:flex-row gap-10 neon-border">
                        <div className="flex-1 space-y-6">
                            <h1 className="text-4xl font-black italic uppercase tracking-tighter">RADIO <span className="text-purple-500">STUDIO</span></h1>
                            <div className="grid grid-cols-2 gap-4">
                                <input type="text" value={streamerName} onChange={e=>setStreamerName(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 text-sm outline-none focus:border-purple-600" placeholder="Nombre"/>
                                <input type="text" value={currentGame} onChange={e=>setCurrentGame(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 text-sm outline-none focus:border-purple-600" placeholder="Juego"/>
                            </div>
                            <div className="bg-zinc-950 p-5 rounded-[2rem] border border-zinc-900">
                                <input type="file" accept="audio/mpeg" multiple onChange={handleFilesUpload} className="text-xs text-zinc-400 file:bg-purple-600 file:text-white file:border-0 file:rounded-full file:px-5 file:py-2 cursor-pointer w-full"/>
                            </div>
                            <textarea value={customInstructions} onChange={e=>setCustomInstructions(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-3xl px-4 py-4 text-sm h-24 outline-none focus:border-purple-600" placeholder="Instrucciones..."></textarea>
                            <button onClick={generatePresentation} disabled={isGenerating || currentIndex === null} className="w-full py-6 bg-purple-600 rounded-[2.5rem] font-black uppercase hover:bg-purple-500 transition-all shadow-lg disabled:opacity-50">
                                {isGenerating ? 'LOCUTOR PENSANDO...' : 'PRESENTAR CANCIÓN'}
                            </button>
                            {error && <div className="text-red-500 text-[10px] font-bold text-center bg-red-500/10 p-3 rounded-2xl border border-red-500/20">{error}</div>}
                        </div>
                        <div className="w-full md:w-80 bg-zinc-950/30 rounded-[3rem] border border-zinc-800 flex flex-col h-[400px]">
                            <div className="p-6 border-b border-zinc-800/50 text-[11px] font-black text-zinc-500 uppercase tracking-widest">Playlist</div>
                            <div className="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-2">
                                {playlist.map((t, i) => (
                                    <div key={t.id} onClick={()=>setCurrentIndex(i)} className={`p-4 rounded-2xl cursor-pointer transition-all border ${currentIndex === i ? 'bg-purple-950/20 border-purple-500/30 text-purple-400' : 'border-transparent text-zinc-500 hover:bg-white/5'}`}>
                                        <p className="text-xs font-bold truncate">{t.title}</p>
                                    </div>
                                ))}
                            </div>
                            {currentIndex !== null && (
                                <div className="p-4 bg-zinc-900 rounded-b-[3rem]">
                                    <audio src={playlist[currentIndex].url} controls className="w-full h-8 invert opacity-50" />
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
