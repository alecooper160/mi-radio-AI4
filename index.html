<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Streamer AI - Neon Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(236, 72, 153, 0.1); }
        .active-track { border-left: 4px solid #db2777; background: rgba(219, 39, 119, 0.1); }
        .neon-border { box-shadow: 0 0 15px rgba(219, 39, 119, 0.3); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 10px; }
        .progress-bar { transition: width 0.1s linear; }
        .debug-log { font-family: 'monospace'; font-size: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 bg-[radial-gradient(ellipse_at_bottom_left,_var(--tw-gradient-stops))] from-purple-950 via-slate-950 to-black">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 bg-gradient-to-r from-blue-600 to-indigo-700 p-6 rounded-3xl shadow-2xl relative overflow-hidden neon-border">
            <div class="relative z-10">
                <h1 class="text-4xl font-black italic tracking-tighter text-white uppercase">Stream Radio AI</h1>
                <p class="text-blue-100 text-sm font-medium">Potenciado por Gemini 2.5 ✨</p>
            </div>
            <div id="status-indicator" class="relative z-10 px-6 py-2 bg-black/40 border border-blue-400/30 backdrop-blur-md rounded-full text-xs font-bold text-blue-300 animate-pulse uppercase">
                🎙️ Locutora AI Hablando...
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <section class="lg:col-span-4 space-y-4">
                <div class="glass p-6 rounded-3xl shadow-xl">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">⚙️ Cabina de Control</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-purple-400 mb-1 uppercase">Nombre del Locutor/a</label>
                            <input type="text" id="username" value="Ale" class="w-full bg-black/50 border border-purple-900/50 rounded-xl px-4 py-2.5 outline-none text-sm text-pink-100">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-purple-400 mb-1 uppercase">Videojuego Actual</label>
                            <input type="text" id="game" value="Forza 5" class="w-full bg-black/50 border border-purple-900/50 rounded-xl px-4 py-2.5 outline-none text-sm text-pink-100">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-bold text-purple-400 mb-1 uppercase">Voz IA</label>
                                <select id="voice-select" class="w-full bg-black/50 border border-purple-900/50 rounded-xl px-3 py-2.5 text-xs">
                                    <option value="Kore">Kore (Cálida)</option>
                                    <option value="Leda">Leda (Elegante)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-purple-400 mb-1 uppercase">Estado Ánimo</label>
                                <select id="mood-select" class="w-full bg-black/50 border border-purple-900/50 rounded-xl px-3 py-2.5 text-xs">
                                    <option value="Alegre">Alegre</option>
                                    <option value="Serio">Serio</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-4 pt-4 border-t border-purple-900/50">
                            <div id="debug-console" class="w-full h-32 bg-black/60 rounded-xl p-3 debug-log overflow-y-auto border border-pink-900/30 text-pink-300">
                                > Sistema listo para Vercel...
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl border border-pink-500/10">
                    <label class="group flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-purple-900 rounded-2xl cursor-pointer hover:border-pink-500 transition-all">
                        <span class="text-xl">🎵 Subir Música</span>
                        <input type="file" id="file-upload" accept="audio/mpeg" multiple class="hidden">
                    </label>
                </div>
            </section>

            <section class="lg:col-span-8 space-y-6">
                <div id="announcer-box" class="hidden glass p-8 rounded-3xl bg-gradient-to-br from-blue-900/20 via-black to-transparent">
                    <p id="announcement-text" class="text-lg font-medium text-blue-50 leading-relaxed italic">Generando guion...</p>
                </div>

                <div class="glass rounded-3xl overflow-hidden shadow-2xl">
                    <div class="p-6 border-b border-purple-950 flex justify-between items-center">
                        <h2 class="font-black text-xl uppercase">Playlist</h2>
                        <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-2xl text-xs font-black text-white uppercase transition-all">Iniciar Radio</button>
                    </div>
                    <div id="playlist-container" class="max-h-[400px] overflow-y-auto p-4 space-y-2"></div>
                </div>

                <div id="mini-player" class="hidden glass p-6 rounded-3xl relative">
                    <div class="absolute top-0 left-0 w-full h-1 bg-purple-950">
                        <div id="progress-line" class="progress-bar h-full bg-blue-500 w-0"></div>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-blue-900/50 rounded-xl flex items-center justify-center">💿</div>
                            <p id="current-track-name" class="text-sm font-black truncate max-w-[200px]">Música</p>
                        </div>
                        <button id="play-pause-btn" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center text-xl">⏸</button>
                    </div>
                </div>
                <audio id="audio-player" class="hidden"></audio>
            </section>
        </div>
    </div>

    <script type="module">
        const apiKey = "AIzaSyAvE-8mocyCqvGBjW6x8pJxn6pTaQX6LgE";
        const MODEL_TEXT = 'gemini-2.5-flash-preview-09-2025';
        const MODEL_TTS = 'gemini-2.5-flash-preview-tts';

        const elements = {
            upload: document.getElementById('file-upload'),
            playlist: document.getElementById('playlist-container'),
            audio: document.getElementById('audio-player'),
            start: document.getElementById('start-btn'),
            announcer: document.getElementById('announcer-box'),
            announcement: document.getElementById('announcement-text'),
            debug: document.getElementById('debug-console'),
            trackName: document.getElementById('current-track-name'),
            progress: document.getElementById('progress-line'),
            playPause: document.getElementById('play-pause-btn')
        };

        let playlist = [];
        let currentIndex = -1;
        let locPlayer = null;

        function log(msg, error = false) {
            const entry = document.createElement('div');
            entry.className = error ? "text-red-400" : "text-blue-300";
            entry.innerText = `> ${msg}`;
            elements.debug.prepend(entry);
        }

        async function safeFetch(url, body) {
            let retries = 3;
            while (retries > 0) {
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (res.ok) return await res.json();
                    if (res.status === 403) throw new Error("API Key inválida o restringida.");
                    retries--;
                    await new Promise(r => setTimeout(r, 1500));
                } catch (e) {
                    if (retries === 1) throw e;
                    retries--;
                }
            }
        }

        elements.upload.onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(f => playlist.push({ name: f.name, url: URL.createObjectURL(f) }));
            renderPlaylist();
            log(`Cargados ${files.length} archivos.`);
        };

        function renderPlaylist() {
            elements.playlist.innerHTML = playlist.map((t, i) => `
                <div onclick="window.playTrack(${i})" class="p-4 rounded-xl cursor-pointer ${i === currentIndex ? 'active-track' : 'bg-black/20'}">
                    ${t.name}
                </div>
            `).join('');
        }

        window.playTrack = async (index) => {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            renderPlaylist();
            
            elements.audio.pause();
            if (locPlayer) locPlayer.pause();
            
            document.getElementById('mini-player').classList.remove('hidden');
            elements.trackName.innerText = playlist[index].name;
            elements.announcer.classList.remove('hidden');

            try {
                log("Generando locución...");
                const prompt = `Presenta la canción "${playlist[index].name}" como locutora para ${document.getElementById('username').value} jugando ${document.getElementById('game').value}. Sé breve (15 palabras).`;
                const textData = await safeFetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_TEXT}:generateContent?key=${apiKey}`, {
                    contents: [{ parts: [{ text: prompt }] }]
                });
                
                const script = textData.candidates[0].content.parts[0].text;
                elements.announcement.innerText = script;

                const ttsData = await safeFetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_TTS}:generateContent?key=${apiKey}`, {
                    contents: [{ parts: [{ text: script }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: document.getElementById('voice-select').value } } }
                    }
                });

                const audioB64 = ttsData.candidates[0].content.parts[0].inlineData.data;
                const blob = pcmToWav(audioB64, 24000);
                
                locPlayer = new Audio(URL.createObjectURL(blob));
                locPlayer.onended = () => {
                    elements.announcer.classList.add('hidden');
                    elements.audio.src = playlist[index].url;
                    elements.audio.play();
                };
                locPlayer.play();
            } catch (e) {
                log("Error API. Saltando a música.", true);
                elements.announcer.classList.add('hidden');
                elements.audio.src = playlist[index].url;
                elements.audio.play();
            }
        };

        function pcmToWav(b64, rate) {
            const bin = atob(b64);
            const buf = new ArrayBuffer(44 + bin.length);
            const view = new DataView(buf);
            const s = (o, str) => { for (let i=0; i<str.length; i++) view.setUint8(o+i, str.charCodeAt(i)); };
            s(0, 'RIFF'); view.setUint32(4, 36 + bin.length, true); s(8, 'WAVE'); s(12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, rate, true); view.setUint32(28, rate * 2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true); s(36, 'data');
            view.setUint32(40, bin.length, true);
            for (let i=0; i<bin.length; i++) view.setUint8(44+i, bin.charCodeAt(i));
            return new Blob([buf], { type: 'audio/wav' });
        }

        elements.start.onclick = () => playlist.length > 0 && window.playTrack(0);
        elements.audio.ontimeupdate = () => elements.progress.style.width = `${(elements.audio.currentTime / elements.audio.duration) * 100}%`;
        elements.audio.onended = () => window.playTrack(currentIndex + 1);
        elements.playPause.onclick = () => elements.audio.paused ? elements.audio.play() : elements.audio.pause();
    </script>
</body>
</html>
